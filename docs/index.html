<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Penguin Blocks Games</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      body {
        margin: 0;
        padding: 2rem 1.25rem;
        max-width: 860px;
        margin-inline: auto;
        line-height: 1.6;
      }
      h1 {
        margin-bottom: 0.25rem;
      }
      .games {
        list-style: none;
        margin: 1.5rem 0;
        padding: 0;
        display: grid;
        gap: 0.75rem;
      }
      .card {
        border: 1px solid color-mix(in oklab, currentColor 30%, transparent);
        border-radius: 12px;
        padding: 1rem;
      }
      a {
        text-decoration: none;
        font-weight: 600;
      }
      a:hover {
        text-decoration: underline;
      }
      small {
        opacity: 0.8;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>Game List</h1>
      <p>このリポジトリで公開しているブラウザゲーム一覧です。</p>
    </header>

    <main>
      <ul class="games">
        <li class="card">
          <a href="./games/penguin-blocks/">Penguin Blocks</a>
          <div><small>落ち物パズルゲーム（既存実装）</small></div>
        </li>
      </ul>
    </main>
  </body>
</html>
