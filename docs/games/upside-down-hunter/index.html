<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>逆さ文字ハンター</title>
    <style>
      :root { color-scheme: dark; }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: "Hiragino Kaku Gothic ProN", "Yu Gothic", sans-serif;
        background: radial-gradient(circle at top, #1d2a44, #0b1020 60%);
        color: #eaf2ff;
        min-height: 100vh;
        display: flex;
        justify-content: center;
        touch-action: none;
      }
      .app { width: min(720px, 100%); padding: 16px 14px 24px; }
      h1 { margin: 8px 0 6px; font-size: 1.9rem; }
      p { margin: 0; line-height: 1.5; }
      .hud {
        margin-top: 14px;
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 8px;
      }
      .panel { background: #121a2f; border: 1px solid #30406d; border-radius: 10px; padding: 10px; text-align: center; }
      .label { font-size: .8rem; color: #9ab3ee; }
      .value { font-size: 1.35rem; font-weight: 700; }
      .board {
        margin-top: 14px;
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 8px;
      }
      .cell {
        aspect-ratio: 1 / 1;
        border: 1px solid #425897;
        border-radius: 12px;
        background: linear-gradient(180deg, #293b66, #1a2747);
        color: #fff;
        font-size: clamp(2rem, 9vw, 3rem);
        font-weight: 700;
        display: grid;
        place-items: center;
        user-select: none;
        -webkit-tap-highlight-color: transparent;
      }
      .cell:active { transform: scale(0.96); }
      .status { margin-top: 12px; min-height: 1.4em; font-weight: 700; color: #ffe28d; }
      .controls { margin-top: 12px; display: flex; gap: 8px; flex-wrap: wrap; }
      button, a.back {
        border: 0;
        border-radius: 999px;
        padding: 10px 16px;
        font-size: 1rem;
        text-decoration: none;
        color: #fff;
      }
      button { background: #41a5ff; font-weight: 700; }
      a.back { background: #465379; }
    </style>
  </head>
  <body>
    <main class="app">
      <h1>逆さ文字ハンター</h1>
      <p>16文字の中に <strong>上下逆さ</strong> の文字が1つだけ！ すばやく見つけてタップ！</p>

      <section class="hud" aria-label="スコア情報">
        <div class="panel"><div class="label">スコア</div><div class="value" id="score">0</div></div>
        <div class="panel"><div class="label">残り時間</div><div class="value" id="time">45</div></div>
        <div class="panel"><div class="label">ベスト</div><div class="value" id="best">0</div></div>
      </section>

      <section class="board" id="board" aria-label="文字グリッド"></section>
      <p class="status" id="status">スタートで開始！</p>

      <div class="controls">
        <button id="start">スタート / リトライ</button>
        <a class="back" href="../../index.html">← 一覧へ戻る</a>
      </div>
    </main>

    <script>
      const CHARS = "あいうえおかきくけこさしすせそたちつてとなにぬねのはひふへほまみむめもやゆよらりるれろわをん";
      const TIME_LIMIT = 45;
      const board = document.getElementById("board");
      const scoreEl = document.getElementById("score");
      const timeEl = document.getElementById("time");
      const bestEl = document.getElementById("best");
      const statusEl = document.getElementById("status");
      const startBtn = document.getElementById("start");

      let score = 0, timeLeft = TIME_LIMIT, timer = null, target = -1, running = false;
      const bestKey = "upsideDownHunterBest";
      let best = Number(localStorage.getItem(bestKey) || 0);
      bestEl.textContent = String(best);

      function pickChar() {
        return CHARS[Math.floor(Math.random() * CHARS.length)];
      }

      function buildRound() {
        board.innerHTML = "";
        const normal = pickChar();
        target = Math.floor(Math.random() * 16);
        for (let i = 0; i < 16; i++) {
          const btn = document.createElement("button");
          btn.className = "cell";
          btn.type = "button";
          btn.textContent = normal;
          if (i === target) btn.style.transform = "rotate(180deg)";
          btn.addEventListener("pointerdown", () => handleTap(i));
          board.appendChild(btn);
        }
      }

      function handleTap(index) {
        if (!running) return;
        if (index === target) {
          score += 1;
          scoreEl.textContent = String(score);
          statusEl.textContent = "正解！ 次の文字へ";
          buildRound();
        } else {
          timeLeft = Math.max(0, timeLeft - 3);
          timeEl.textContent = String(timeLeft);
          statusEl.textContent = "ハズレ！ -3秒";
          if (timeLeft <= 0) endGame();
        }
      }

      function tick() {
        timeLeft -= 1;
        timeEl.textContent = String(timeLeft);
        if (timeLeft <= 0) endGame();
      }

      function startGame() {
        score = 0;
        timeLeft = TIME_LIMIT;
        running = true;
        scoreEl.textContent = "0";
        timeEl.textContent = String(TIME_LIMIT);
        statusEl.textContent = "逆さ文字を見つけよう！";
        buildRound();
        clearInterval(timer);
        timer = setInterval(tick, 1000);
      }

      function endGame() {
        running = false;
        clearInterval(timer);
        statusEl.textContent = `終了！ スコア: ${score}`;
        if (score > best) {
          best = score;
          localStorage.setItem(bestKey, String(best));
          bestEl.textContent = String(best);
          statusEl.textContent += "（ベスト更新！）";
        }
      }

      startBtn.addEventListener("pointerdown", startGame);
      buildRound();
    </script>
  </body>
</html>
