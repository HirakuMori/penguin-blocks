<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>郵便ペンギン仕分け便</title>
    <style>
      :root {
        --bg: #fbe9ee;
        --bg2: #e7f4f9;
        --ink: #2d2a3a;
        --muted: #817d92;
        --panel: #fff;
        --panel2: #fff6f9;
        --shadow: 0 8px 0 rgba(45, 42, 58, 0.08);
        --red: #f7b8c4;
        --blue: #a9dcf0;
        --yellow: #ffe49a;
        --green: #bde6c8;
        --gate: #6b5b95;
        font-family: "Hiragino Maru Gothic ProN", "Yu Gothic", system-ui, sans-serif;
      }

      * { box-sizing: border-box; }

      html,
      body {
        margin: 0;
        min-height: 100%;
      }

      body {
        color: var(--ink);
        background:
          radial-gradient(900px 600px at 12% -10%, #ffe3ec 0%, transparent 60%),
          radial-gradient(800px 580px at 105% 105%, #d9edf7 0%, transparent 58%),
          linear-gradient(180deg, var(--bg), var(--bg2));
        -webkit-tap-highlight-color: transparent;
        user-select: none;
      }

      .app {
        width: min(100%, 440px);
        min-height: 100dvh;
        margin: 0 auto;
        padding: 12px 12px 16px;
        display: grid;
        grid-template-rows: auto auto minmax(370px, 1fr) auto auto;
        gap: 10px;
      }

      .top {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        padding: 4px 2px;
      }

      h1 {
        margin: 0;
        font-size: 20px;
        line-height: 1.1;
        font-weight: 900;
      }

      a {
        color: var(--ink);
        font-size: 13px;
        font-weight: 800;
        text-decoration: none;
        background: var(--panel);
        border-radius: 999px;
        padding: 8px 12px;
        box-shadow: var(--shadow);
        white-space: nowrap;
      }

      .stats {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 8px;
      }

      .stat,
      .message,
      .parcel {
        background: var(--panel);
        border-radius: 20px;
        box-shadow: var(--shadow);
      }

      .stat {
        min-height: 58px;
        padding: 8px 9px;
      }

      .label {
        color: var(--muted);
        font-size: 10px;
        font-weight: 900;
        letter-spacing: 0.08em;
      }

      .value {
        margin-top: 2px;
        font-size: 19px;
        font-weight: 900;
        font-variant-numeric: tabular-nums;
      }

      .stage {
        position: relative;
        min-height: 0;
        overflow: hidden;
        border-radius: 24px;
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.65), transparent 32%),
          linear-gradient(180deg, #fff5f8, #edf8fc);
        box-shadow: var(--shadow), inset 0 0 0 2px rgba(255,255,255,0.9);
        touch-action: none;
      }

      .belt {
        position: absolute;
        left: 0;
        right: 0;
        top: 43%;
        height: 96px;
        transform: translateY(-50%);
        background:
          repeating-linear-gradient(90deg, rgba(45,42,58,0.08) 0 26px, rgba(45,42,58,0.02) 26px 52px),
          linear-gradient(180deg, #e0d4db, #f0e5eb);
        border-block: 2px solid rgba(45,42,58,0.12);
      }

      .belt::before,
      .belt::after {
        content: "";
        position: absolute;
        top: 16px;
        width: 24px;
        height: 64px;
        border-radius: 999px;
        background: rgba(45,42,58,0.12);
      }

      .belt::before { left: 12px; }
      .belt::after { right: 12px; }

      .upper-belt {
        position: absolute;
        left: 18px;
        right: 18px;
        top: 19%;
        height: 58px;
        transform: translateY(-50%);
        overflow: hidden;
        border-radius: 999px;
        background:
          repeating-linear-gradient(90deg, rgba(45,42,58,0.07) 0 20px, rgba(45,42,58,0.02) 20px 40px),
          linear-gradient(180deg, #d9edf7, #f8fdff);
        border: 2px solid rgba(45,42,58,0.1);
        box-shadow: inset 0 4px 0 rgba(255,255,255,0.58);
      }

      .upper-belt::before,
      .upper-belt::after {
        content: "";
        position: absolute;
        top: 12px;
        width: 26px;
        height: 34px;
        border-radius: 50%;
        background: rgba(45,42,58,0.1);
      }

      .upper-belt::before { left: 12px; }
      .upper-belt::after { right: 12px; }

      .upper-belt span {
        position: absolute;
        left: 50%;
        top: 50%;
        transform: translate(-50%, -50%);
        color: rgba(45,42,58,0.42);
        font-size: 12px;
        font-weight: 900;
        letter-spacing: 0.08em;
        white-space: nowrap;
      }

      .gate {
        position: absolute;
        left: 50%;
        top: 43%;
        width: 96px;
        height: 122px;
        transform: translate(-50%, -50%);
        border: 3px dashed rgba(107,91,149,0.74);
        border-radius: 22px;
        background: rgba(255,255,255,0.2);
        pointer-events: none;
      }

      .gate::before {
        content: "ここで押す";
        position: absolute;
        left: 50%;
        top: -28px;
        transform: translateX(-50%);
        color: var(--gate);
        font-size: 12px;
        font-weight: 900;
        white-space: nowrap;
      }

      .penguin {
        position: absolute;
        left: 50%;
        bottom: 116px;
        width: 112px;
        height: 130px;
        transform: translateX(-50%);
        filter: drop-shadow(0 8px 0 rgba(45,42,58,0.08));
        pointer-events: none;
      }

      .penguin.bump-ok {
        animation: penguinBumpOk 300ms ease-out;
      }

      .penguin.bump-ng {
        animation: penguinBumpNg 360ms ease-out;
      }

      .penguin::before {
        content: "";
        position: absolute;
        left: 12px;
        top: 13px;
        width: 88px;
        height: 108px;
        border-radius: 48% 48% 46% 46%;
        background: var(--blue);
        border: 3px solid var(--ink);
      }

      .penguin::after {
        content: "";
        position: absolute;
        left: 31px;
        top: 40px;
        width: 50px;
        height: 70px;
        border-radius: 50%;
        background: #f7fcff;
      }

      .eye,
      .cheek,
      .beak {
        position: absolute;
        z-index: 1;
      }

      .eye {
        top: 46px;
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: var(--ink);
        box-shadow: 3px -2px 0 -1px #fff;
      }

      .eye.left { left: 40px; }
      .eye.right { right: 40px; }

      .cheek {
        top: 64px;
        width: 14px;
        height: 10px;
        border-radius: 50%;
        background: var(--red);
        opacity: 0.85;
      }

      .cheek.left { left: 27px; }
      .cheek.right { right: 27px; }

      .beak {
        left: 47px;
        top: 59px;
        width: 0;
        height: 0;
        border-left: 9px solid transparent;
        border-right: 9px solid transparent;
        border-top: 15px solid #ffc27a;
      }

      .parcel {
        position: absolute;
        left: 0;
        top: 43%;
        width: 140px;
        min-height: 92px;
        padding: 10px 12px;
        transform: translate(-180px, -50%);
        text-align: center;
        will-change: transform, opacity;
        border: 2px solid rgba(45,42,58,0.1);
      }

      .parcel.success-flight {
        z-index: 2;
        animation: upperDelivery 680ms cubic-bezier(.16,.86,.32,1) forwards;
      }

      .parcel.fail-flight {
        z-index: 2;
        animation: parcelBlowAway 620ms cubic-bezier(.2,.75,.22,1) forwards;
      }

      .parcel .stamp {
        width: 34px;
        height: 28px;
        margin-left: auto;
        border-radius: 7px;
        background: var(--stamp);
        box-shadow: inset 0 0 0 3px rgba(255,255,255,0.48);
      }

      .parcel .address {
        margin-top: 7px;
        padding-top: 8px;
        border-top: 2px dashed rgba(45,42,58,0.15);
        font-size: 16px;
        font-weight: 900;
      }

      .parcel .hint {
        margin-top: 2px;
        color: var(--muted);
        font-size: 11px;
        font-weight: 800;
      }

      .slot-row {
        position: absolute;
        left: 10px;
        right: 10px;
        bottom: 10px;
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 8px;
      }

      .slot {
        position: relative;
        min-height: 86px;
        border: 0;
        border-radius: 18px;
        color: var(--ink);
        font: inherit;
        font-size: 13px;
        line-height: 1.15;
        font-weight: 900;
        cursor: pointer;
        box-shadow: 0 6px 0 rgba(45,42,58,0.1);
        display: grid;
        place-items: center;
        gap: 2px;
        padding: 7px 4px;
      }

      .slot:active,
      .slot.active {
        transform: translateY(2px);
        box-shadow: 0 4px 0 rgba(45,42,58,0.1);
      }

      .slot .mark {
        width: 42px;
        height: 34px;
        border-radius: 7px;
        background: rgba(255,255,255,0.78);
        border: 2px solid rgba(45,42,58,0.18);
        position: relative;
      }

      .slot .mark::before {
        content: "";
        position: absolute;
        inset: 6px 5px auto;
        height: 2px;
        background: rgba(45,42,58,0.22);
        box-shadow: 0 7px 0 rgba(45,42,58,0.16);
      }

      .slot .key {
        position: absolute;
        left: 7px;
        top: 6px;
        width: 22px;
        height: 22px;
        border-radius: 50%;
        display: grid;
        place-items: center;
        background: rgba(255,255,255,0.72);
        font-size: 12px;
      }

      .slot.red { background: var(--red); }
      .slot.blue { background: var(--blue); }
      .slot.yellow { background: var(--yellow); }
      .slot.green { background: var(--green); }

      .timing {
        display: grid;
        grid-template-columns: auto 1fr auto;
        gap: 8px;
        align-items: center;
        color: var(--muted);
        font-size: 12px;
        font-weight: 900;
      }

      .timing-bar {
        position: relative;
        height: 12px;
        overflow: hidden;
        border-radius: 999px;
        background: rgba(255,255,255,0.72);
        box-shadow: inset 0 0 0 2px rgba(45,42,58,0.06);
      }

      .timing-bar::before {
        content: "";
        position: absolute;
        left: calc(50% - 10%);
        top: 0;
        bottom: 0;
        width: 20%;
        background: rgba(107,91,149,0.26);
      }

      .needle {
        position: absolute;
        left: 0;
        top: 0;
        width: 4px;
        height: 100%;
        border-radius: 999px;
        background: var(--gate);
        transform: translateX(-2px);
      }

      .message {
        padding: 10px 12px;
        min-height: 44px;
        font-size: 14px;
        font-weight: 800;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
      }

      .controls {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
      }

      button.action {
        min-height: 48px;
        border: 0;
        border-radius: 999px;
        background: var(--ink);
        color: #fff;
        font: inherit;
        font-size: 15px;
        font-weight: 900;
        cursor: pointer;
        box-shadow: 0 5px 0 #1a1823;
      }

      button.action.secondary {
        background: #fff;
        color: var(--ink);
        box-shadow: var(--shadow);
      }

      .toast {
        position: absolute;
        left: 50%;
        top: 15%;
        transform: translate(-50%, -8px);
        padding: 8px 14px;
        border-radius: 999px;
        background: rgba(255,255,255,0.94);
        color: var(--ink);
        font-size: 14px;
        font-weight: 900;
        box-shadow: var(--shadow);
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.16s ease, transform 0.16s ease;
        z-index: 3;
      }

      .toast.on {
        opacity: 1;
        transform: translate(-50%, 0);
      }

      .overlay {
        position: absolute;
        inset: 0;
        display: grid;
        place-items: center;
        padding: 18px;
        background: rgba(255,246,249,0.84);
        backdrop-filter: blur(6px);
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.2s ease;
        z-index: 4;
      }

      .overlay.on {
        opacity: 1;
        pointer-events: auto;
      }

      .overlay-panel {
        width: min(100%, 300px);
        padding: 22px 20px 18px;
        border-radius: 24px;
        background: #fff;
        box-shadow: 0 14px 0 rgba(45,42,58,0.08);
        text-align: center;
      }

      .overlay-panel h2 {
        margin: 0;
        font-size: 24px;
      }

      .overlay-panel p {
        margin: 8px 0 16px;
        color: var(--muted);
        font-size: 13px;
        font-weight: 800;
        line-height: 1.5;
      }

      .spark {
        position: absolute;
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: var(--spark);
        pointer-events: none;
        animation: pop 520ms ease-out forwards;
      }

      @keyframes pop {
        to {
          opacity: 0;
          transform: translate(var(--dx), var(--dy)) scale(0.35);
        }
      }

      @keyframes upperDelivery {
        0% {
          opacity: 1;
          transform: translate(var(--from-x), -50%) rotate(0deg) scale(1);
        }
        34% {
          opacity: 1;
          transform: translate(calc(var(--lane-x) - 14px), calc(-50% + var(--lift-y) + 24px)) rotate(-8deg) scale(1.05);
        }
        62% {
          opacity: 1;
          transform: translate(var(--lane-x), calc(-50% + var(--lift-y))) rotate(2deg) scale(0.98);
        }
        100% {
          opacity: 0.95;
          transform: translate(var(--exit-x), calc(-50% + var(--lift-y))) rotate(0deg) scale(0.92);
        }
      }

      @keyframes parcelBlowAway {
        0% {
          opacity: 1;
          transform: translate(var(--from-x), -50%) rotate(0deg) scale(1);
        }
        28% {
          opacity: 1;
          transform: translate(calc(var(--from-x) + var(--hit-x)), calc(-50% - 10px)) rotate(var(--tilt));
        }
        100% {
          opacity: 0;
          transform: translate(var(--exit-x), calc(-50% + var(--fail-y))) rotate(var(--spin)) scale(0.82);
        }
      }

      @keyframes penguinBumpOk {
        0%, 100% { transform: translateX(-50%) translateY(0) rotate(0deg); }
        45% { transform: translateX(-50%) translateY(-18px) rotate(-5deg) scale(1.04); }
      }

      @keyframes penguinBumpNg {
        0%, 100% { transform: translateX(-50%) translateY(0) rotate(0deg); }
        35% { transform: translateX(calc(-50% + 12px)) translateY(-8px) rotate(7deg) scale(1.03); }
        68% { transform: translateX(calc(-50% - 6px)) translateY(2px) rotate(-4deg); }
      }

      @media (max-width: 370px) {
        h1 { font-size: 17px; }
        .stats { gap: 6px; }
        .stat { padding: 7px 6px; }
        .value { font-size: 17px; }
        .slot { min-height: 76px; font-size: 12px; }
        .slot .mark { width: 34px; }
        .parcel { width: 126px; }
      }
    </style>
  </head>
  <body>
    <div class="app">
      <header class="top">
        <h1>郵便ペンギン仕分け便</h1>
        <a href="../../index.html">← 一覧へ戻る</a>
      </header>

      <section class="stats" aria-label="スコア情報">
        <div class="stat"><div class="label">SCORE</div><div class="value" id="score">0</div></div>
        <div class="stat"><div class="label">TIME</div><div class="value" id="time">45</div></div>
        <div class="stat"><div class="label">COMBO</div><div class="value" id="combo">0</div></div>
        <div class="stat"><div class="label">BEST</div><div class="value" id="best">0</div></div>
      </section>

      <main class="stage" id="stage" aria-label="仕分け場">
        <div class="upper-belt" aria-hidden="true"><span>配達レーン</span></div>
        <div class="belt"></div>
        <div class="gate" aria-hidden="true"></div>
        <div class="toast" id="toast">正解！</div>
        <div class="penguin" aria-hidden="true">
          <span class="eye left"></span>
          <span class="eye right"></span>
          <span class="cheek left"></span>
          <span class="cheek right"></span>
          <span class="beak"></span>
        </div>
        <div id="parcel" class="parcel" aria-live="polite"></div>
        <div class="slot-row" id="slots"></div>
        <div class="overlay on" id="overlay">
          <div class="overlay-panel">
            <h2 id="overlayTitle">配達準備OK</h2>
            <p id="overlayText">荷物が中央のゲートに重なった瞬間、宛先と同じ配達先ボタンを押そう。数字キー1〜4でも操作できます。</p>
            <button class="action" id="startBtn">はじめる</button>
          </div>
        </div>
      </main>

      <section class="timing" aria-label="タイミング表示">
        <span>はやい</span>
        <div class="timing-bar"><span class="needle" id="needle"></span></div>
        <span>おそい</span>
      </section>

      <section class="message">
        <span id="message">荷物がゲートに来たら、正しい配達先へ。</span>
        <span id="status">待機中</span>
      </section>

      <section class="controls">
        <button class="action" id="startAgainBtn">スタート</button>
        <button class="action secondary" id="soundBtn">音 ON</button>
      </section>
    </div>

    <script>
      const DESTS = [
        { key: "red", name: "さくら町", color: "#f7b8c4", kana: "あか" },
        { key: "blue", name: "そら港", color: "#a9dcf0", kana: "あお" },
        { key: "yellow", name: "ひなた通り", color: "#ffe49a", kana: "きいろ" },
        { key: "green", name: "みどり丘", color: "#bde6c8", kana: "みどり" },
      ];

      const SPEED_BASE = 132;
      const SPEED_MAX = 286;

      const state = {
        running: false,
        sound: true,
        score: 0,
        time: 45,
        combo: 0,
        best: Number(localStorage.getItem("postPenguinBest") || 0),
        current: null,
        parcelX: -180,
        speed: SPEED_BASE,
        loopId: 0,
        lastNow: 0,
        handled: false,
        animationTimer: 0,
      };

      const el = {
        score: document.getElementById("score"),
        time: document.getElementById("time"),
        combo: document.getElementById("combo"),
        best: document.getElementById("best"),
        parcel: document.getElementById("parcel"),
        penguin: document.querySelector(".penguin"),
        needle: document.getElementById("needle"),
        slots: document.getElementById("slots"),
        stage: document.getElementById("stage"),
        toast: document.getElementById("toast"),
        overlay: document.getElementById("overlay"),
        overlayTitle: document.getElementById("overlayTitle"),
        overlayText: document.getElementById("overlayText"),
        startBtn: document.getElementById("startBtn"),
        startAgainBtn: document.getElementById("startAgainBtn"),
        soundBtn: document.getElementById("soundBtn"),
        message: document.getElementById("message"),
        status: document.getElementById("status"),
      };

      let audioContext = null;
      let masterGain = null;

      function ensureAudio() {
        if (audioContext) return;
        audioContext = new (window.AudioContext || window.webkitAudioContext)();
        masterGain = audioContext.createGain();
        masterGain.gain.value = 0.18;
        masterGain.connect(audioContext.destination);
      }

      function tone(freq, dur, delay = 0, type = "triangle", vol = 0.28) {
        if (!state.sound) return;
        ensureAudio();
        const t = audioContext.currentTime + delay;
        const osc = audioContext.createOscillator();
        const gain = audioContext.createGain();
        osc.type = type;
        osc.frequency.value = freq;
        osc.connect(gain);
        gain.connect(masterGain);
        gain.gain.setValueAtTime(0, t);
        gain.gain.linearRampToValueAtTime(vol, t + 0.01);
        gain.gain.exponentialRampToValueAtTime(0.001, t + dur);
        osc.start(t);
        osc.stop(t + dur + 0.03);
      }

      function sfx(kind) {
        if (kind === "perfect") {
          [784, 1046, 1318].forEach((f, i) => tone(f, 0.15, i * 0.04));
        } else if (kind === "ok") {
          [660, 880].forEach((f, i) => tone(f, 0.14, i * 0.05));
        } else if (kind === "ng") {
          tone(220, 0.18, 0, "sawtooth", 0.18);
          tone(150, 0.24, 0.07, "sawtooth", 0.14);
        } else if (kind === "start") {
          [523, 659, 784].forEach((f, i) => tone(f, 0.14, i * 0.07));
        } else if (kind === "over") {
          [392, 330, 262].forEach((f, i) => tone(f, 0.24, i * 0.1));
        }
      }

      function renderSlots() {
        el.slots.innerHTML = "";
        DESTS.forEach((dest, index) => {
          const button = document.createElement("button");
          button.className = `slot ${dest.key}`;
          button.type = "button";
          button.setAttribute("aria-label", `${index + 1}. ${dest.name}`);
          button.innerHTML = `<span class="key">${index + 1}</span><span class="mark"></span><span>${dest.name}</span>`;
          button.addEventListener("pointerdown", (event) => {
            event.preventDefault();
            sortTo(dest.key);
          });
          el.slots.appendChild(button);
        });
      }

      function updateHud() {
        el.score.textContent = state.score.toLocaleString();
        el.time.textContent = Math.ceil(state.time);
        el.combo.textContent = state.combo;
        el.best.textContent = state.best.toLocaleString();
        el.status.textContent = state.running ? `速度 x${(state.speed / SPEED_BASE).toFixed(1)}` : "待機中";
        el.soundBtn.textContent = state.sound ? "音 ON" : "音 OFF";
      }

      function speedForCombo(combo) {
        const early = Math.min(combo, 5) * 9;
        const middle = Math.min(Math.max(combo - 5, 0), 7) * 13;
        const late = Math.max(combo - 12, 0) * 7;
        return Math.min(SPEED_MAX, SPEED_BASE + early + middle + late);
      }

      function stageMetrics() {
        const rect = el.stage.getBoundingClientRect();
        const parcelWidth = el.parcel.offsetWidth || 140;
        return {
          width: rect.width,
          height: rect.height,
          start: -parcelWidth - 36,
          end: rect.width + 36,
          gate: rect.width / 2,
          ok: Math.max(44, Math.min(58, rect.width * 0.13)),
          perfect: Math.max(18, Math.min(26, rect.width * 0.06)),
          parcelWidth,
        };
      }

      function chooseParcel() {
        const metrics = stageMetrics();
        clearTimeout(state.animationTimer);
        state.current = DESTS[Math.floor(Math.random() * DESTS.length)];
        state.parcelX = metrics.start;
        state.handled = false;
        state.speed = speedForCombo(state.combo);
        el.parcel.classList.remove("success-flight", "fail-flight");
        el.parcel.style.opacity = "1";
        el.parcel.style.setProperty("--stamp", state.current.color);
        el.parcel.innerHTML = `
          <div class="stamp"></div>
          <div class="address">${state.current.name} 行き</div>
          <div class="hint">${state.current.kana}の配達先へ</div>
        `;
        placeParcel();
      }

      function parcelCenter() {
        return state.parcelX + (el.parcel.offsetWidth || 140) / 2;
      }

      function timingDelta() {
        const metrics = stageMetrics();
        return parcelCenter() - metrics.gate;
      }

      function placeParcel() {
        el.parcel.style.transform = `translate(${state.parcelX}px, -50%)`;
        const metrics = stageMetrics();
        const progress = Math.max(0, Math.min(1, (parcelCenter() - metrics.start) / (metrics.end - metrics.start)));
        el.needle.style.left = `${progress * 100}%`;
      }

      function showToast(text, ok) {
        el.toast.textContent = text;
        el.toast.style.background = ok ? "rgba(255,255,255,0.96)" : "rgba(255,232,236,0.96)";
        el.toast.classList.add("on");
        clearTimeout(showToast.timer);
        showToast.timer = setTimeout(() => el.toast.classList.remove("on"), 520);
      }

      function spark(color) {
        const rect = el.stage.getBoundingClientRect();
        for (let i = 0; i < 12; i++) {
          const dot = document.createElement("span");
          dot.className = "spark";
          dot.style.left = `${rect.width / 2 + (Math.random() - 0.5) * 90}px`;
          dot.style.top = `${rect.height * 0.43 + (Math.random() - 0.5) * 55}px`;
          dot.style.setProperty("--spark", color);
          dot.style.setProperty("--dx", `${(Math.random() - 0.5) * 130}px`);
          dot.style.setProperty("--dy", `${-30 - Math.random() * 90}px`);
          el.stage.appendChild(dot);
          dot.addEventListener("animationend", () => dot.remove());
        }
      }

      function flashSlot(key) {
        const button = el.slots.querySelector(`.${key}`);
        if (!button) return;
        button.classList.add("active");
        setTimeout(() => button.classList.remove("active"), 120);
      }

      function bumpPenguin(ok) {
        const className = ok ? "bump-ok" : "bump-ng";
        el.penguin.classList.remove("bump-ok", "bump-ng");
        void el.penguin.offsetWidth;
        el.penguin.classList.add(className);
        setTimeout(() => el.penguin.classList.remove(className), ok ? 320 : 380);
      }

      function scoreHit(delta) {
        const metrics = stageMetrics();
        const perfect = Math.abs(delta) <= metrics.perfect;
        state.combo += 1;
        state.score += (perfect ? 25 : 12) + Math.min(30, state.combo * 2);
        showToast(perfect ? `ぴったり！ ${state.combo}コンボ` : `配達！ ${state.combo}コンボ`, true);
        spark(state.current.color);
        sfx(perfect ? "perfect" : "ok");
        el.message.textContent = perfect ? `${state.current.name}へど真ん中配達！` : `${state.current.name}へ配達完了。次の便！`;
      }

      function fail(reason) {
        const name = state.current ? state.current.name : "荷物";
        state.combo = 0;
        state.score = Math.max(0, state.score - 7);
        showToast(reason.toast, false);
        sfx("ng");
        el.message.textContent = reason.message(name);
      }

      function flyParcel(ok, delta = 0) {
        const metrics = stageMetrics();
        const fromX = state.parcelX;
        const laneX = metrics.gate - metrics.parcelWidth / 2;
        el.parcel.style.setProperty("--from-x", `${fromX}px`);
        el.parcel.style.setProperty("--lane-x", `${laneX}px`);
        el.parcel.style.setProperty("--lift-y", `${-Math.max(92, metrics.height * 0.24)}px`);
        if (ok) {
          el.parcel.style.setProperty("--exit-x", `${metrics.end + 60}px`);
          el.parcel.classList.add("success-flight");
          return 680;
        }
        const toRight = delta >= 0;
        el.parcel.style.setProperty("--hit-x", toRight ? "18px" : "-18px");
        el.parcel.style.setProperty("--exit-x", `${toRight ? metrics.end + 140 : metrics.start - 150}px`);
        el.parcel.style.setProperty("--fail-y", `${-70 + Math.random() * 140}px`);
        el.parcel.style.setProperty("--tilt", toRight ? "12deg" : "-12deg");
        el.parcel.style.setProperty("--spin", toRight ? "410deg" : "-410deg");
        el.parcel.classList.add("fail-flight");
        return 620;
      }

      function nextParcelSoon(ok, delta = 0) {
        state.handled = true;
        bumpPenguin(ok);
        const delay = flyParcel(ok, delta);
        updateHud();
        clearTimeout(state.animationTimer);
        state.animationTimer = setTimeout(() => {
          if (state.running) chooseParcel();
        }, delay);
      }

      function sortTo(key) {
        if (!state.running || !state.current || state.handled) return;
        flashSlot(key);
        const metrics = stageMetrics();
        const delta = timingDelta();
        const inWindow = Math.abs(delta) <= metrics.ok;
        if (!inWindow) {
          fail({
            toast: delta < 0 ? "早すぎ！" : "遅すぎ！",
            message: (name) => `${name}行き、${delta < 0 ? "まだゲート前です。" : "通り過ぎました。"}`,
          });
          nextParcelSoon(false, delta);
          return;
        }
        if (key !== state.current.key) {
          fail({
            toast: "誤配送！",
            message: (name) => `${name}行きではありません。宛先もタイミングも見よう。`,
          });
          nextParcelSoon(false, delta);
          return;
        }
        scoreHit(delta);
        nextParcelSoon(true, delta);
      }

      function missParcel() {
        if (state.handled || !state.current) return;
        fail({
          toast: "見送り！",
          message: (name) => `${name}行きがゲートを通過。次こそ押そう！`,
        });
        nextParcelSoon(false, 1);
      }

      function startGame() {
        ensureAudio();
        if (audioContext.state === "suspended") audioContext.resume();
        cancelAnimationFrame(state.loopId);
        clearTimeout(state.animationTimer);
        state.running = true;
        state.score = 0;
        state.combo = 0;
        state.time = 45;
        state.lastNow = 0;
        el.overlay.classList.remove("on");
        el.message.textContent = "ゲートに重なった瞬間、宛先と同じボタンを押してください。";
        chooseParcel();
        updateHud();
        sfx("start");
        state.loopId = requestAnimationFrame(loop);
      }

      function endGame() {
        state.running = false;
        state.current = null;
        cancelAnimationFrame(state.loopId);
        clearTimeout(state.animationTimer);
        if (state.score > state.best) {
          state.best = state.score;
          localStorage.setItem("postPenguinBest", String(state.best));
        }
        el.overlayTitle.textContent = "本日の配達完了";
        el.overlayText.textContent = `スコア ${state.score.toLocaleString()} / ベスト ${state.best.toLocaleString()}。もう一便いきますか？`;
        el.startBtn.textContent = "もう一回";
        el.overlay.classList.add("on");
        el.message.textContent = "おつかれさま！ペンギン局員も満足そうです。";
        el.parcel.style.opacity = "0";
        updateHud();
        sfx("over");
      }

      function loop(now) {
        if (!state.running) return;
        if (!state.lastNow) state.lastNow = now;
        const dt = Math.min(0.05, (now - state.lastNow) / 1000);
        state.lastNow = now;
        state.time = Math.max(0, state.time - dt);
        if (!state.handled) {
          state.parcelX += state.speed * dt;
          placeParcel();
          const metrics = stageMetrics();
          if (parcelCenter() > metrics.gate + metrics.ok) missParcel();
        }
        if (state.time <= 0) {
          updateHud();
          endGame();
          return;
        }
        updateHud();
        state.loopId = requestAnimationFrame(loop);
      }

      window.addEventListener("keydown", (event) => {
        const index = Number(event.key) - 1;
        if (index >= 0 && index < DESTS.length) {
          event.preventDefault();
          sortTo(DESTS[index].key);
        }
        if (event.key === "Enter" && !state.running) startGame();
      });

      el.startBtn.addEventListener("click", startGame);
      el.startAgainBtn.addEventListener("click", startGame);
      el.soundBtn.addEventListener("click", () => {
        state.sound = !state.sound;
        if (state.sound) {
          ensureAudio();
          if (audioContext.state === "suspended") audioContext.resume();
          sfx("ok");
        }
        updateHud();
      });

      window.addEventListener("resize", placeParcel);

      renderSlots();
      updateHud();
      chooseParcel();
    </script>
  </body>
</html>
