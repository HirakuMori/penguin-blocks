<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Plant Merge Cascade</title>
    <style>
      :root { color-scheme: light; }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #f4f3ee;
        font-family: "Hiragino Kaku Gothic ProN", "Yu Gothic", sans-serif;
        color: #2f3b31;
      }
      .wrap { width: min(92vw, 440px); }
      h1 { font-size: 1.2rem; margin: 0 0 8px; }
      .hint { margin: 0 0 14px; font-size: 0.88rem; color: #5a6a5f; }
      .topbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
      .status { font-size: 0.9rem; padding: 6px 10px; background: #fff; border-radius: 999px; }
      .back { font-size: 0.82rem; }
      .board {
        position: relative;
        width: 100%;
        aspect-ratio: 1;
        background: #dde3d8;
        border-radius: 20px;
        padding: 10px;
        display: grid;
        grid-template-columns: repeat(5, 1fr);
        gap: 8px;
        touch-action: none;
      }
      .cell { border-radius: 14px; background: #edf1ea; }
      .tile {
        position: absolute;
        width: calc((100% - 20px - 32px) / 5);
        aspect-ratio: 1;
        border-radius: 16px;
        display: grid;
        place-items: center;
        font-size: clamp(20px, 4vw, 30px);
        font-weight: 700;
        color: #193125;
        box-shadow: 0 8px 14px #00000016;
        transition: transform 220ms cubic-bezier(.2,.72,.2,1), opacity 220ms ease;
        user-select: none;
        transform-origin: center;
      }
      .tile.l1{ background:#d8f2c7; }
      .tile.l2{ background:#9de282; }
      .tile.l3{ background:#6fd3bc; }
      .tile.l4{ background:#f3a8c8; }
      .tile.l5{ background:#f0d26d; animation: bloomPulse 1.6s ease-in-out infinite; box-shadow: 0 0 0 2px #f9e6aa inset,0 8px 18px #ceb24780; }
      .tile.dragging { z-index: 5; transition: none; transform: scale(.95); }
      .tile.pop { animation: popIn 240ms ease; }
      .tile.land { animation: landBounce 200ms ease; }
      .tile.harvest { opacity: 0; transform: scale(1.3); transition: transform 260ms ease, opacity 260ms ease; }
      @keyframes popIn { 0%{transform:scale(1)} 45%{transform:scale(1.15)} 100%{transform:scale(1)} }
      @keyframes bloomPulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.05)} }
      @keyframes landBounce { 0%{transform:scale(1)} 40%{transform:scale(1.05)} 100%{transform:scale(1)} }
      .overlay { margin-top: 10px; min-height: 1.4em; font-size: .9rem; color:#34503f; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="topbar">
        <div class="status" id="status">つなげて育てよう 🌱</div>
        <a class="back" href="../../index.html">← 一覧へ戻る</a>
      </div>
      <h1>プラント・マージ・カスケード</h1>
      <p class="hint">同じ植物を隣へ動かして合体。連鎖でどんどん育成！</p>
      <div class="board" id="board"></div>
      <div class="overlay" id="msg"></div>
    </div>
<script>
(() => {
  const SIZE = 5;
  const names = ["","種","芽","葉","花","開花"];
  const icons = ["","·","🌱","🍃","🌸","🌼"];
  const boardEl = document.getElementById('board');
  const msg = document.getElementById('msg');
  const status = document.getElementById('status');
  const state = { grid: Array.from({length:SIZE},()=>Array(SIZE).fill(null)), animating:false, id:0, drag:null };
  const wait = ms => new Promise(r=>setTimeout(r,ms));
  const inB=(r,c)=>r>=0&&r<SIZE&&c>=0&&c<SIZE;
  const adj=(a,b)=>Math.abs(a.r-b.r)+Math.abs(a.c-b.c)===1;

  function pos(r,c){
    const rect = boardEl.getBoundingClientRect(); const cell=(rect.width-20-32)/5; const step=cell+8;
    return {x:10+c*step,y:10+r*step};
  }
  function makeTile(r,c,l){
    const el=document.createElement('div'); el.className=`tile l${l}`; el.textContent=icons[l];
    el.dataset.id=String(++state.id); el.dataset.r=r; el.dataset.c=c; el.dataset.level=l;
    const p=pos(r,c); el.style.transform=`translate(${p.x}px,${p.y}px)`;
    boardEl.appendChild(el); attachDrag(el); return {id:+el.dataset.id,level:l,el};
  }
  function attachGrid(){ for(let i=0;i<SIZE*SIZE;i++){ const d=document.createElement('div'); d.className='cell'; boardEl.appendChild(d);} }
  function attachDrag(el){
    el.addEventListener('pointerdown',e=>{ if(state.animating) return; state.drag={id:+el.dataset.id,sx:e.clientX,sy:e.clientY}; el.setPointerCapture(e.pointerId); el.classList.add('dragging');});
    el.addEventListener('pointermove',e=>{ if(!state.drag||state.drag.id!==+el.dataset.id) return; const dx=e.clientX-state.drag.sx,dy=e.clientY-state.drag.sy; const p=pos(+el.dataset.r,+el.dataset.c); el.style.transform=`translate(${p.x+dx}px,${p.y+dy}px) scale(.95)`;});
    el.addEventListener('pointerup',async e=>{ if(!state.drag||state.drag.id!==+el.dataset.id) return; el.classList.remove('dragging'); const from={r:+el.dataset.r,c:+el.dataset.c}; const to=pickCell(e.clientX,e.clientY) || from; state.drag=null; await playerMove(from,to);});
  }
  function pickCell(x,y){
    const b=boardEl.getBoundingClientRect(); if(x<b.left||x>b.right||y<b.top||y>b.bottom) return null;
    const cell=(b.width-20-32)/5, step=cell+8; const c=Math.max(0,Math.min(4,Math.floor((x-b.left-10)/step))); const r=Math.max(0,Math.min(4,Math.floor((y-b.top-10)/step))); return {r,c};
  }
  function redraw(){
    for(let r=0;r<SIZE;r++)for(let c=0;c<SIZE;c++){ const t=state.grid[r][c]; if(!t) continue; t.el.dataset.r=r;t.el.dataset.c=c;t.el.dataset.level=t.level;t.el.className=`tile l${t.level}`; t.el.textContent=icons[t.level]; const p=pos(r,c); t.el.style.transform=`translate(${p.x}px,${p.y}px)`; }
  }
  async function playerMove(from,to){
    if(state.animating||!adj(from,to)){ redraw(); return; }
    const a=state.grid[from.r][from.c], b=state.grid[to.r][to.c]; if(!a){ redraw(); return; }
    state.animating=true;
    if(!b){ state.grid[to.r][to.c]=a; state.grid[from.r][from.c]=null; redraw(); await wait(150); }
    else if(a.level===b.level){ await mergePair(from,to); }
    else { state.grid[from.r][from.c]=b; state.grid[to.r][to.c]=a; redraw(); await wait(160); }
    await resolveBoard();
    spawn();
    redraw();
    checkGameOver();
    state.animating=false;
  }
  async function mergePair(from,to){
    const a=state.grid[from.r][from.c], b=state.grid[to.r][to.c]; if(!a||!b||a.level!==b.level) return;
    const pa=pos(from.r,from.c), pt=pos(to.r,to.c);
    a.el.style.transform=`translate(${pt.x}px,${pt.y}px) scale(.95)`; await wait(120);
    if(a.level===5){ a.el.classList.add('harvest'); b.el.classList.add('harvest'); await wait(260); a.el.remove(); b.el.remove(); state.grid[from.r][from.c]=null; state.grid[to.r][to.c]=null; msg.textContent='✨ 収穫！開花どうしが消えました'; return; }
    a.el.remove(); b.el.remove(); const lv=a.level+1; state.grid[from.r][from.c]=null; state.grid[to.r][to.c]=makeTile(to.r,to.c,lv); state.grid[to.r][to.c].el.classList.add('pop'); msg.textContent=`${names[a.level]} → ${names[lv]} に成長！`; await wait(170);
  }
  async function resolveBoard(){
    let changed=true;
    while(changed){
      changed=await gravity();
      await wait(90);
      const m=findAutoMerge();
      if(m){ await mergePair(m.from,m.to); changed=true; await wait(100); }
    }
  }
  async function gravity(){
    let moved=false;
    for(let c=0;c<SIZE;c++){
      for(let r=SIZE-1;r>=0;r--){
        if(state.grid[r][c]) continue;
        for(let k=r-1;k>=0;k--) if(state.grid[k][c]){ const t=state.grid[k][c]; state.grid[r][c]=t; state.grid[k][c]=null; t.el.classList.add('land'); moved=true; break; }
      }
    }
    redraw(); if(moved) await wait(210); return moved;
  }
  function findAutoMerge(){
    for(let r=0;r<SIZE;r++)for(let c=0;c<SIZE;c++){
      const t=state.grid[r][c]; if(!t) continue;
      const ds=[[1,0],[0,1],[-1,0],[0,-1]];
      for(const [dr,dc] of ds){ const nr=r+dr,nc=c+dc; if(inB(nr,nc)&&state.grid[nr][nc]&&state.grid[nr][nc].level===t.level) return {from:{r,c},to:{r:nr,c:nc}}; }
    }
    return null;
  }
  function spawn(){
    const empties=[]; for(let r=0;r<SIZE;r++)for(let c=0;c<SIZE;c++) if(!state.grid[r][c]) empties.push({r,c});
    if(!empties.length) return;
    const p=empties[(Math.random()*empties.length)|0]; const lv=Math.random()<0.7?1:2; state.grid[p.r][p.c]=makeTile(p.r,p.c,lv); state.grid[p.r][p.c].el.classList.add('pop');
  }
  function checkGameOver(){
    for(let r=0;r<SIZE;r++)for(let c=0;c<SIZE;c++) if(!state.grid[r][c]) return;
    for(let r=0;r<SIZE;r++)for(let c=0;c<SIZE;c++) for(const [dr,dc] of [[1,0],[-1,0],[0,1],[0,-1]]){ const nr=r+dr,nc=c+dc; if(inB(nr,nc)){ const a=state.grid[r][c],b=state.grid[nr][nc]; if(a.level===b.level) return; }}
    status.textContent='ゲームオーバー'; msg.textContent='空きマスも同レベル隣接もありません。';
  }
  function init(){ attachGrid(); spawn(); spawn(); spawn(); redraw(); }
  addEventListener('resize',redraw); init();
})();
</script>
  </body>
</html>
