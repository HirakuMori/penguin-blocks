document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

"<!DOCTYPE html>\n<html lang=\"ja\"><head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width,initial-scale=1,viewport-fit=cover\">\n<title>Penguin Blocks<\u002Ftitle>\n\n<style>\n  :root {\n    --bg: #fbe9ee;\n    --bg-2: #e7f4f9;\n    --ink: #2d2a3a;\n    --muted: #8a869b;\n    --panel: #ffffff;\n    --panel-2: #fff5f8;\n    --grid: #f1dde4;\n    --grid-2: #e6d4db;\n    --shadow: 0 8px 0 0 rgba(45,42,58,.08);\n    --radius: 22px;\n\n    /* Penguin pastels (one per tetromino) */\n    --pg-I: #a9dcf0; /* sky     */\n    --pg-O: #ffd8a8; /* peach   */\n    --pg-T: #d9c4ef; /* lavender*/\n    --pg-S: #bde6c8; /* mint    */\n    --pg-Z: #f7b8c4; /* pink    */\n    --pg-L: #ffe49a; /* butter  */\n    --pg-J: #b9c8f0; /* periwinkle */\n  }\n\n  * { box-sizing: border-box; }\n  html, body { margin:0; padding:0; height:100%; }\n  body {\n    font-family: \"Nunito\", \"Hiragino Maru Gothic ProN\", \"Quicksand\", system-ui, sans-serif;\n    color: var(--ink);\n    background:\n      radial-gradient(1200px 800px at 10% -10%, #ffe3ec 0%, transparent 60%),\n      radial-gradient(1000px 700px at 110% 110%, #d8ecf7 0%, transparent 55%),\n      linear-gradient(180deg, var(--bg) 0%, var(--bg-2) 100%);\n    min-height: 100dvh;\n    display: flex;\n    align-items: center;\n    justify-content: center;\n    overflow: hidden;\n    -webkit-tap-highlight-color: transparent;\n    user-select: none;\n  }\n\n  /* phone stage */\n  #stage {\n    width: 100%;\n    max-width: 420px;\n    height: 100dvh;\n    max-height: 900px;\n    display: flex;\n    flex-direction: column;\n    padding: 14px 14px 18px;\n    gap: 10px;\n  }\n\n  /* header */\n  .hdr {\n    display: flex;\n    align-items: center;\n    justify-content: space-between;\n    padding: 6px 8px;\n  }\n  .logo {\n    display: flex; align-items: center; gap: 8px;\n    font-weight: 800; font-size: 18px; letter-spacing: .01em;\n  }\n  .logo .dot { width:10px;height:10px;border-radius:50%;background:#f7b8c4;box-shadow:0 0 0 4px #fde6ec;}\n  .score-pill {\n    background: var(--panel);\n    border-radius: 999px;\n    padding: 6px 14px;\n    font-weight: 800;\n    font-size: 14px;\n    box-shadow: var(--shadow);\n    display: flex; align-items:center; gap:8px;\n  }\n  .score-pill .lbl { font-size:10px;color:var(--muted);font-weight:700;letter-spacing:.12em;}\n  .score-pill .val { font-variant-numeric: tabular-nums; }\n\n  /* topbar with next + level */\n  .topbar {\n    display: grid;\n    grid-template-columns: 1fr auto;\n    gap: 10px;\n    align-items: stretch;\n  }\n  .card {\n    background: var(--panel);\n    border-radius: var(--radius);\n    box-shadow: var(--shadow);\n    padding: 10px 12px;\n  }\n  .stats { display:flex; gap:14px; align-items:center; }\n  .stat { display:flex; flex-direction:column; gap:2px; }\n  .stat .lbl { font-size: 10px; color: var(--muted); font-weight: 800; letter-spacing:.12em;}\n  .stat .val { font-size: 20px; font-weight: 800; font-variant-numeric: tabular-nums; }\n  .next-card {\n    padding: 8px 10px 6px;\n    display:flex; flex-direction:column; align-items:center; gap:2px;\n    min-width: 92px;\n  }\n  .next-card .lbl { font-size: 10px; color: var(--muted); font-weight: 800; letter-spacing:.12em; }\n  #nextCanvas {\n    width: 76px; height: 48px; display:block;\n  }\n\n  /* playfield */\n  .field-wrap {\n    position: relative;\n    flex: 1 1 auto;\n    min-height: 0;\n    display: flex;\n    justify-content: center;\n  }\n  .field {\n    position: relative;\n    background: var(--panel-2);\n    border-radius: var(--radius);\n    box-shadow: var(--shadow), inset 0 0 0 2px #ffffff;\n    overflow: hidden;\n    aspect-ratio: 10 / 20;\n    height: 100%;\n    max-width: 100%;\n  }\n  .field canvas { display:block; width:100%; height:100%; }\n\n  /* overlays */\n  .overlay {\n    position: absolute; inset: 0;\n    display: flex; align-items: center; justify-content: center;\n    background: rgba(255,245,248,.86);\n    backdrop-filter: blur(6px);\n    -webkit-backdrop-filter: blur(6px);\n    z-index: 3;\n    pointer-events: none;\n    opacity: 0;\n    transition: opacity .25s ease;\n  }\n  .overlay.on { opacity: 1; pointer-events: auto; }\n  .overlay .panel {\n    background: #fff;\n    border-radius: 24px;\n    padding: 22px 22px 18px;\n    box-shadow: 0 18px 0 0 rgba(45,42,58,.08);\n    text-align:center;\n    min-width: 240px;\n  }\n  .overlay h2 { margin:0 0 4px; font-size: 22px; font-weight: 900; letter-spacing:.01em;}\n  .overlay p  { margin:0 0 14px; color: var(--muted); font-size: 13px; font-weight:700;}\n  .btn {\n    appearance:none; border: 0; cursor: pointer;\n    background: #2d2a3a; color: #fff;\n    font-family: inherit; font-weight: 800; font-size: 15px;\n    border-radius: 999px; padding: 12px 22px;\n    box-shadow: 0 4px 0 0 #1a1823;\n    transition: transform .06s ease, box-shadow .06s ease;\n  }\n  .btn:active { transform: translateY(2px); box-shadow: 0 2px 0 0 #1a1823; }\n  .btn.pink { background: #f7b8c4; color:#2d2a3a; box-shadow: 0 4px 0 0 #e899a8; }\n  .btn.pink:active { box-shadow: 0 2px 0 0 #e899a8; }\n\n  /* controls */\n  .controls {\n    display: grid;\n    grid-template-columns: 1fr 1fr 1fr 1fr;\n    gap: 10px;\n  }\n  .ctrl {\n    appearance: none; border: 0; cursor: pointer;\n    background: var(--panel);\n    border-radius: 20px;\n    box-shadow: var(--shadow);\n    padding: 14px 0;\n    display: flex; align-items:center; justify-content:center;\n    transition: transform .06s ease, box-shadow .06s ease, background .12s ease;\n    position: relative;\n    font-family: inherit;\n  }\n  .ctrl:active { transform: translateY(2px); box-shadow: 0 4px 0 0 rgba(45,42,58,.08); background: #fff5f8; }\n  .ctrl svg { width: 28px; height: 28px; }\n  .ctrl .lbl { position:absolute; bottom:6px; font-size:9px; font-weight:800; color:var(--muted); letter-spacing:.1em;}\n  .ctrl.drop { background: #f7b8c4; }\n  .ctrl.drop:active { background:#f3a5b4; }\n  .ctrl.rot  { background: #d9c4ef; }\n  .ctrl.rot:active  { background:#c9b0e6; }\n\n  /* small header buttons */\n  .icon-btn {\n    appearance: none; border: 0; cursor: pointer;\n    width: 36px; height: 36px; border-radius: 50%;\n    background: var(--panel); box-shadow: var(--shadow);\n    display: inline-flex; align-items: center; justify-content: center;\n    margin-left: 6px;\n  }\n  .icon-btn svg { width: 18px; height: 18px; }\n\n  /* toast for line clear */\n  .toast {\n    position: absolute;\n    top: 14px; left: 50%;\n    transform: translateX(-50%) translateY(-6px);\n    background: rgba(255,255,255,.95);\n    color: var(--ink);\n    padding: 6px 14px;\n    border-radius: 999px;\n    font-weight: 900;\n    font-size: 13px;\n    box-shadow: var(--shadow);\n    opacity: 0;\n    transition: opacity .18s ease, transform .18s ease;\n    pointer-events: none;\n    z-index: 2;\n  }\n  .toast.on { opacity: 1; transform: translateX(-50%) translateY(0); }\n\n  /* tweaks panel */\n  #tweaks {\n    position: fixed; right: 14px; bottom: 14px;\n    background: #fff; border-radius: 18px;\n    box-shadow: 0 10px 30px rgba(45,42,58,.18);\n    padding: 14px 14px 12px;\n    width: 240px;\n    font-size: 12px;\n    z-index: 10;\n    display: none;\n  }\n  #tweaks.on { display: block; }\n  #tweaks h3 { margin: 0 0 10px; font-size: 12px; letter-spacing:.12em; color: var(--muted); font-weight: 800; }\n  #tweaks label { display:flex; justify-content: space-between; align-items:center; gap: 10px; margin: 8px 0; font-weight: 700;}\n  #tweaks input[type=range] { flex: 1; }\n  #tweaks select, #tweaks input[type=color] { font: inherit; }\n  .row { display:flex; gap:8px; flex-wrap:wrap; }\n  .chip { padding:6px 10px; border-radius: 999px; background:#f1dde4; font-weight:800; font-size:11px; cursor:pointer;}\n  .chip.on { background:#2d2a3a; color:#fff; }\n\n  /* floating \"nyu\" penguin */\n  .fly {\n    position: absolute;\n    pointer-events: none;\n    z-index: 4;\n    will-change: transform, opacity;\n  }\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n\n<div id=\"stage\">\n  <div class=\"hdr\">\n    <div class=\"logo\"><span class=\"dot\"><\u002Fspan>Penguin Blocks<\u002Fdiv>\n    <div>\n      <button class=\"icon-btn\" id=\"soundBtn\" aria-label=\"sound\">\n        <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#2d2a3a\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\n          <path d=\"M11 5 6 9H2v6h4l5 4V5z\"><\u002Fpath><path d=\"M15.5 8.5a5 5 0 0 1 0 7\"><\u002Fpath>\n        <\u002Fsvg>\n      <\u002Fbutton>\n      <button class=\"icon-btn\" id=\"pauseBtn\" aria-label=\"pause\">\n        <svg viewBox=\"0 0 24 24\" fill=\"#2d2a3a\"><rect x=\"6\" y=\"5\" width=\"4\" height=\"14\" rx=\"1\"><\u002Frect><rect x=\"14\" y=\"5\" width=\"4\" height=\"14\" rx=\"1\"><\u002Frect><\u002Fsvg>\n      <\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"topbar\">\n    <div class=\"card stats\">\n      <div class=\"stat\"><div class=\"lbl\">SCORE<\u002Fdiv><div class=\"val\" id=\"score\">0<\u002Fdiv><\u002Fdiv>\n      <div class=\"stat\"><div class=\"lbl\">LINES<\u002Fdiv><div class=\"val\" id=\"lines\">0<\u002Fdiv><\u002Fdiv>\n      <div class=\"stat\"><div class=\"lbl\">LEVEL<\u002Fdiv><div class=\"val\" id=\"level\">1<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"card next-card\">\n      <div class=\"lbl\">NEXT<\u002Fdiv>\n      <canvas id=\"nextCanvas\" width=\"152\" height=\"96\"><\u002Fcanvas>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"field-wrap\">\n    <div class=\"field\" id=\"field\">\n      <canvas id=\"board\" width=\"300\" height=\"600\"><\u002Fcanvas>\n      <div class=\"toast\" id=\"toast\">にゅっ！<\u002Fdiv>\n      <div class=\"overlay\" id=\"overlay\">\n        <div class=\"panel\">\n          <h2 id=\"ovTitle\">Penguin Blocks<\u002Fh2>\n          <p id=\"ovSub\">タップしてスタート<\u002Fp>\n          <button class=\"btn pink\" id=\"startBtn\">はじめる<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"controls\">\n    <button class=\"ctrl\" id=\"leftBtn\" aria-label=\"left\">\n      <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#2d2a3a\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M15 6l-6 6 6 6\"><\u002Fpath><\u002Fsvg>\n      <span class=\"lbl\">LEFT<\u002Fspan>\n    <\u002Fbutton>\n    <button class=\"ctrl rot\" id=\"rotBtn\" aria-label=\"rotate\">\n      <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#2d2a3a\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\n        <path d=\"M20 12a8 8 0 1 1-2.34-5.66\"><\u002Fpath><path d=\"M20 4v5h-5\"><\u002Fpath>\n      <\u002Fsvg>\n      <span class=\"lbl\">ROTATE<\u002Fspan>\n    <\u002Fbutton>\n    <button class=\"ctrl\" id=\"rightBtn\" aria-label=\"right\">\n      <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#2d2a3a\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M9 6l6 6-6 6\"><\u002Fpath><\u002Fsvg>\n      <span class=\"lbl\">RIGHT<\u002Fspan>\n    <\u002Fbutton>\n    <button class=\"ctrl drop\" id=\"dropBtn\" aria-label=\"drop\">\n      <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#2d2a3a\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\n        <path d=\"M12 4v14\"><\u002Fpath><path d=\"M6 14l6 6 6-6\"><\u002Fpath>\n      <\u002Fsvg>\n      <span class=\"lbl\">DROP<\u002Fspan>\n    <\u002Fbutton>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- Tweaks -->\n<div id=\"tweaks\">\n  <h3>TWEAKS<\u002Fh3>\n  <label>Speed <input type=\"range\" id=\"tSpeed\" min=\"0.5\" max=\"2.5\" step=\"0.1\" value=\"1\"><\u002Flabel>\n  <label>Sound\n    <span class=\"row\">\n      <span class=\"chip on\" data-sound=\"on\">ON<\u002Fspan>\n      <span class=\"chip\" data-sound=\"off\">OFF<\u002Fspan>\n    <\u002Fspan>\n  <\u002Flabel>\n  <label>Theme\n    <span class=\"row\">\n      <span class=\"chip on\" data-theme=\"sakura\">さくら<\u002Fspan>\n      <span class=\"chip\" data-theme=\"mint\">ミント<\u002Fspan>\n      <span class=\"chip\" data-theme=\"sky\">そら<\u002Fspan>\n    <\u002Fspan>\n  <\u002Flabel>\n  <label>Ghost\n    <span class=\"row\">\n      <span class=\"chip on\" data-ghost=\"on\">ON<\u002Fspan>\n      <span class=\"chip\" data-ghost=\"off\">OFF<\u002Fspan>\n    <\u002Fspan>\n  <\u002Flabel>\n<\u002Fdiv>\n\n<script>\n/* =========================================================\n   Penguin Blocks — original, non-branded implementation\n   ========================================================= */\n\nconst TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{\n  \"speed\": 0.9,\n  \"sound\": true,\n  \"theme\": \"sky\",\n  \"ghost\": true\n}/*EDITMODE-END*/;\n\nconst state = {\n  ...TWEAK_DEFAULTS,\n  running: false,\n  paused: false,\n  over: false,\n  score: 0,\n  lines: 0,\n  level: 1,\n};\n\n/* ---------- Tetromino shapes (standard 7) ---------- */\nconst SHAPES = {\n  I: { rot:[[[0,1],[1,1],[2,1],[3,1]],[[2,0],[2,1],[2,2],[2,3]],[[0,2],[1,2],[2,2],[3,2]],[[1,0],[1,1],[1,2],[1,3]]], color:'I' },\n  O: { rot:[[[1,0],[2,0],[1,1],[2,1]]], color:'O' },\n  T: { rot:[[[1,0],[0,1],[1,1],[2,1]],[[1,0],[1,1],[2,1],[1,2]],[[0,1],[1,1],[2,1],[1,2]],[[1,0],[0,1],[1,1],[1,2]]], color:'T' },\n  S: { rot:[[[1,0],[2,0],[0,1],[1,1]],[[1,0],[1,1],[2,1],[2,2]],[[1,1],[2,1],[0,2],[1,2]],[[0,0],[0,1],[1,1],[1,2]]], color:'S' },\n  Z: { rot:[[[0,0],[1,0],[1,1],[2,1]],[[2,0],[1,1],[2,1],[1,2]],[[0,1],[1,1],[1,2],[2,2]],[[1,0],[0,1],[1,1],[0,2]]], color:'Z' },\n  L: { rot:[[[2,0],[0,1],[1,1],[2,1]],[[1,0],[1,1],[1,2],[2,2]],[[0,1],[1,1],[2,1],[0,2]],[[0,0],[1,0],[1,1],[1,2]]], color:'L' },\n  J: { rot:[[[0,0],[0,1],[1,1],[2,1]],[[1,0],[2,0],[1,1],[1,2]],[[0,1],[1,1],[2,1],[2,2]],[[1,0],[1,1],[0,2],[1,2]]], color:'J' },\n};\nconst TYPES = Object.keys(SHAPES);\n\n/* Pastel palette per type — body / belly / beak / cheek */\nconst PAL = {\n  I: { body:'#a9dcf0', belly:'#f4fbff', beak:'#ffc27a', cheek:'#ffb3c1', eye:'#2d2a3a' },\n  O: { body:'#ffd8a8', belly:'#fff6e9', beak:'#ff9f6b', cheek:'#ffb3c1', eye:'#2d2a3a' },\n  T: { body:'#d9c4ef', belly:'#f7efff', beak:'#ffc27a', cheek:'#ffb3c1', eye:'#2d2a3a' },\n  S: { body:'#bde6c8', belly:'#f1fbf4', beak:'#ffc27a', cheek:'#ffb3c1', eye:'#2d2a3a' },\n  Z: { body:'#f7b8c4', belly:'#fff0f4', beak:'#ffc27a', cheek:'#ffb3c1', eye:'#2d2a3a' },\n  L: { body:'#ffe49a', belly:'#fff9e2', beak:'#ff9f6b', cheek:'#ffb3c1', eye:'#2d2a3a' },\n  J: { body:'#b9c8f0', belly:'#eff3ff', beak:'#ffc27a', cheek:'#ffb3c1', eye:'#2d2a3a' },\n};\n\n/* ---------- Board ---------- */\nconst COLS = 10, ROWS = 20;\nlet board = []; // board[y][x] = null | typeKey\nfunction resetBoard(){ board = Array.from({length: ROWS}, ()=>Array(COLS).fill(null)); }\n\n/* ---------- Piece ---------- */\nlet cur = null, next = null;\nlet dropTimer = 0, dropInterval = 700;\nlet lastTs = 0;\n\nfunction spawn(){\n  const type = next ?? randType();\n  next = randType();\n  cur = {\n    type, rot: 0,\n    x: 3, y: -1, // I needs -1 to start\n  };\n  if (collides(cur.x, cur.y, cur.rot)) {\n    gameOver(); return;\n  }\n  renderNext();\n}\nlet bag = [];\nfunction randType(){\n  if (bag.length === 0) bag = TYPES.slice().sort(()=>Math.random()-0.5);\n  return bag.pop();\n}\n\nfunction getCells(piece){\n  return SHAPES[piece.type].rot[piece.rot % SHAPES[piece.type].rot.length];\n}\nfunction collides(nx, ny, nrot){\n  const cells = SHAPES[cur.type].rot[nrot % SHAPES[cur.type].rot.length];\n  for (const [dx, dy] of cells){\n    const x = nx + dx, y = ny + dy;\n    if (x < 0 || x >= COLS || y >= ROWS) return true;\n    if (y >= 0 && board[y][x]) return true;\n  }\n  return false;\n}\nfunction lock(){\n  const cells = getCells(cur);\n  for (const [dx, dy] of cells){\n    const x = cur.x + dx, y = cur.y + dy;\n    if (y < 0){ gameOver(); return; }\n    board[y][x] = cur.type;\n  }\n  clearLines();\n  spawn();\n}\n\n/* ---------- Line clear with \"にゅっ\" fly-off ---------- */\nfunction clearLines(){\n  const full = [];\n  for (let y=0; y<ROWS; y++){\n    if (board[y].every(c => c !== null)) full.push(y);\n  }\n  if (full.length === 0) return;\n\n  // Fly penguins from each full row\n  flyPenguinsFromRows(full);\n  showToast(full.length === 4 ? 'にゅーーっ！！' : 'にゅっ！');\n\n  // Remove rows\n  for (const y of full){\n    board.splice(y, 1);\n    board.unshift(Array(COLS).fill(null));\n  }\n\n  state.lines += full.length;\n  const points = [0, 100, 300, 500, 800][full.length] || 0;\n  state.score += points * state.level;\n  const newLevel = 1 + Math.floor(state.lines / 8);\n  if (newLevel !== state.level){\n    state.level = newLevel;\n    dropInterval = Math.max(120, 700 * Math.pow(0.85, state.level - 1));\n    sfx('levelup');\n    showToast(`LEVEL ${state.level}`);\n  }\n  updateHUD();\n  sfx('clear', full.length);\n}\n\n/* ---------- Game loop ---------- */\nfunction tick(ts){\n  if (!state.running) return;\n  if (state.paused || state.over){ lastTs = ts; requestAnimationFrame(tick); return; }\n  if (!lastTs) lastTs = ts;\n  const dt = ts - lastTs; lastTs = ts;\n  dropTimer += dt * state.speed;\n  if (dropTimer >= dropInterval){\n    dropTimer = 0;\n    if (!tryMove(0, 1)) lock();\n  }\n  draw();\n  requestAnimationFrame(tick);\n}\n\nfunction tryMove(dx, dy){\n  if (!cur) return false;\n  if (!collides(cur.x + dx, cur.y + dy, cur.rot)){\n    cur.x += dx; cur.y += dy;\n    return true;\n  }\n  return false;\n}\nfunction rotate(){\n  if (!cur) return;\n  const nrot = (cur.rot + 1) % SHAPES[cur.type].rot.length;\n  // wall kicks: try offsets\n  const kicks = [0, -1, 1, -2, 2];\n  for (const k of kicks){\n    if (!collides(cur.x + k, cur.y, nrot)){\n      cur.x += k; cur.rot = nrot; sfx('rot'); return;\n    }\n  }\n}\nfunction hardDrop(){\n  if (!cur) return;\n  let d = 0;\n  while (tryMove(0, 1)) d++;\n  state.score += d * 2;\n  updateHUD();\n  sfx('drop');\n  lock();\n}\n\n/* ---------- Rendering ---------- */\nconst boardCanvas = document.getElementById('board');\nconst ctx = boardCanvas.getContext('2d');\nconst nextCanvas = document.getElementById('nextCanvas');\nconst nctx = nextCanvas.getContext('2d');\n\nfunction sizeCanvases(){\n  const fieldEl = document.getElementById('field');\n  const r = fieldEl.getBoundingClientRect();\n  const dpr = Math.min(window.devicePixelRatio || 1, 2);\n  boardCanvas.width  = Math.floor(r.width  * dpr);\n  boardCanvas.height = Math.floor(r.height * dpr);\n  ctx.setTransform(dpr,0,0,dpr,0,0);\n  // next canvas\n  const nr = nextCanvas.getBoundingClientRect();\n  nextCanvas.width  = Math.floor(nr.width  * dpr);\n  nextCanvas.height = Math.floor(nr.height * dpr);\n  nctx.setTransform(dpr,0,0,dpr,0,0);\n}\nwindow.addEventListener('resize', sizeCanvases);\n\nfunction draw(){\n  const fieldEl = document.getElementById('field');\n  const r = fieldEl.getBoundingClientRect();\n  const cw = r.width, ch = r.height;\n  const cell = Math.min(cw / COLS, ch / ROWS);\n  const ox = (cw - cell * COLS) / 2;\n  const oy = (ch - cell * ROWS) / 2;\n\n  ctx.clearRect(0,0,cw,ch);\n\n  // subtle grid dots\n  ctx.fillStyle = 'rgba(45,42,58,.05)';\n  for (let y=0; y<ROWS; y++){\n    for (let x=0; x<COLS; x++){\n      ctx.beginPath();\n      ctx.arc(ox + x*cell + cell/2, oy + y*cell + cell/2, 1.4, 0, Math.PI*2);\n      ctx.fill();\n    }\n  }\n\n  // locked cells\n  for (let y=0; y<ROWS; y++){\n    for (let x=0; x<COLS; x++){\n      const t = board[y][x];\n      if (t) drawPenguin(ctx, ox + x*cell, oy + y*cell, cell, t, {sleep: false});\n    }\n  }\n\n  // ghost\n  if (state.ghost && cur){\n    let gy = cur.y;\n    while (!collides(cur.x, gy + 1, cur.rot)) gy++;\n    const cells = getCells(cur);\n    ctx.save();\n    ctx.globalAlpha = 0.22;\n    for (const [dx, dy] of cells){\n      const x = cur.x + dx, y = gy + dy;\n      if (y < 0) continue;\n      drawBlob(ctx, ox + x*cell, oy + y*cell, cell, PAL[cur.type].body);\n    }\n    ctx.restore();\n  }\n\n  // current\n  if (cur){\n    const cells = getCells(cur);\n    for (const [dx, dy] of cells){\n      const x = cur.x + dx, y = cur.y + dy;\n      if (y < 0) continue;\n      drawPenguin(ctx, ox + x*cell, oy + y*cell, cell, cur.type, {sleep: false});\n    }\n  }\n}\n\nfunction drawBlob(g, x, y, s, color){\n  const r = s * 0.42;\n  const cx = x + s/2, cy = y + s*0.55;\n  g.fillStyle = color;\n  g.beginPath();\n  g.ellipse(cx, cy, r, r * 1.12, 0, 0, Math.PI*2);\n  g.fill();\n}\n\n/** Draw a stylized round penguin from circles & a triangle */\nfunction drawPenguin(g, x, y, s, type, opts={}){\n  const p = PAL[type];\n  const cx = x + s/2;\n  const cy = y + s*0.56;\n  const r  = s * 0.42;\n\n  // soft shadow under\n  g.fillStyle = 'rgba(45,42,58,.08)';\n  g.beginPath();\n  g.ellipse(cx, y + s*0.95, r*0.9, r*0.18, 0, 0, Math.PI*2);\n  g.fill();\n\n  // body\n  g.fillStyle = p.body;\n  g.beginPath();\n  g.ellipse(cx, cy, r, r*1.12, 0, 0, Math.PI*2);\n  g.fill();\n\n  // belly (lighter oval)\n  g.fillStyle = p.belly;\n  g.beginPath();\n  g.ellipse(cx, cy + s*0.04, r*0.62, r*0.82, 0, 0, Math.PI*2);\n  g.fill();\n\n  // cheeks\n  g.fillStyle = p.cheek;\n  g.beginPath();\n  g.arc(cx - r*0.55, cy - s*0.02, s*0.055, 0, Math.PI*2);\n  g.arc(cx + r*0.55, cy - s*0.02, s*0.055, 0, Math.PI*2);\n  g.fill();\n\n  // eyes\n  g.fillStyle = p.eye;\n  const er = s*0.045;\n  if (opts.sleep){\n    g.lineWidth = Math.max(1, s*0.04);\n    g.strokeStyle = p.eye;\n    g.beginPath();\n    g.moveTo(cx - r*0.32, cy - s*0.10); g.lineTo(cx - r*0.12, cy - s*0.08);\n    g.moveTo(cx + r*0.12, cy - s*0.08); g.lineTo(cx + r*0.32, cy - s*0.10);\n    g.stroke();\n  } else {\n    g.beginPath();\n    g.arc(cx - r*0.22, cy - s*0.10, er, 0, Math.PI*2);\n    g.arc(cx + r*0.22, cy - s*0.10, er, 0, Math.PI*2);\n    g.fill();\n    // eye shine\n    g.fillStyle = '#fff';\n    g.beginPath();\n    g.arc(cx - r*0.18, cy - s*0.12, er*0.35, 0, Math.PI*2);\n    g.arc(cx + r*0.26, cy - s*0.12, er*0.35, 0, Math.PI*2);\n    g.fill();\n  }\n\n  // beak (triangle)\n  g.fillStyle = p.beak;\n  g.beginPath();\n  g.moveTo(cx, cy - s*0.02);\n  g.lineTo(cx - s*0.07, cy + s*0.04);\n  g.lineTo(cx + s*0.07, cy + s*0.04);\n  g.closePath();\n  g.fill();\n}\n\nfunction renderNext(){\n  const g = nctx;\n  const w = nextCanvas.getBoundingClientRect().width;\n  const h = nextCanvas.getBoundingClientRect().height;\n  g.clearRect(0,0,w,h);\n  if (!next) return;\n  const cells = SHAPES[next].rot[0];\n  // compute bounding box\n  let minX=9,minY=9,maxX=0,maxY=0;\n  for (const [x,y] of cells){\n    minX=Math.min(minX,x); minY=Math.min(minY,y);\n    maxX=Math.max(maxX,x); maxY=Math.max(maxY,y);\n  }\n  const bw = maxX - minX + 1, bh = maxY - minY + 1;\n  const s = Math.min(w / (bw+1), h / (bh+1));\n  const ox = (w - s*bw)/2 - minX*s;\n  const oy = (h - s*bh)/2 - minY*s;\n  for (const [x,y] of cells){\n    drawPenguin(g, ox + x*s, oy + y*s, s, next, {sleep:false});\n  }\n}\n\n/* ---------- Fly-off animation on clear ---------- */\nfunction flyPenguinsFromRows(rows){\n  const fieldEl = document.getElementById('field');\n  const r = fieldEl.getBoundingClientRect();\n  const cell = Math.min(r.width / COLS, r.height / ROWS);\n  const ox = (r.width - cell * COLS) / 2;\n  const oy = (r.height - cell * ROWS) / 2;\n\n  for (const y of rows){\n    for (let x=0; x<COLS; x++){\n      const t = board[y][x];\n      if (!t) continue;\n      spawnFly(ox + x*cell, oy + y*cell, cell, t);\n    }\n  }\n}\n\nfunction spawnFly(px, py, s, type){\n  const fieldEl = document.getElementById('field');\n  const el = document.createElement('canvas');\n  el.width = el.height = Math.ceil(s * 2);\n  el.style.width = el.style.height = (s) + 'px';\n  el.className = 'fly';\n  el.style.left = px + 'px';\n  el.style.top  = py + 'px';\n  const g = el.getContext('2d');\n  g.scale(2,2);\n  drawPenguin(g, 0, 0, s, type, {sleep:false});\n  fieldEl.appendChild(el);\n\n  const angle = (-Math.PI/2) + (Math.random() - 0.5) * 1.2;\n  const speed = 260 + Math.random()*180;\n  const vx = Math.cos(angle) * speed;\n  const vy = Math.sin(angle) * speed;\n  const rotSpeed = (Math.random() - 0.5) * 720;\n  const start = performance.now();\n  const dur = 900 + Math.random()*300;\n\n  function step(now){\n    const t = (now - start) / 1000;\n    const life = (now - start) / dur;\n    if (life >= 1){ el.remove(); return; }\n    const nx = vx * t;\n    const ny = vy * t + 0.5 * 520 * t * t; // gravity\n    const rot = rotSpeed * t;\n    const scale = 1 + t*0.3;\n    el.style.transform = `translate(${nx}px, ${ny}px) rotate(${rot}deg) scale(${scale})`;\n    el.style.opacity = String(1 - life*life);\n    requestAnimationFrame(step);\n  }\n  requestAnimationFrame(step);\n}\n\n/* ---------- HUD ---------- */\nfunction updateHUD(){\n  document.getElementById('score').textContent = state.score.toLocaleString();\n  document.getElementById('lines').textContent = state.lines;\n  document.getElementById('level').textContent = state.level;\n}\n\nfunction showToast(msg){\n  const el = document.getElementById('toast');\n  el.textContent = msg;\n  el.classList.add('on');\n  clearTimeout(showToast._t);\n  showToast._t = setTimeout(()=> el.classList.remove('on'), 700);\n}\n\n/* ---------- Sound (Web Audio) ---------- */\nlet actx = null, masterGain = null, bgmNodes = null;\nfunction ensureAudio(){\n  if (actx) return;\n  actx = new (window.AudioContext || window.webkitAudioContext)();\n  masterGain = actx.createGain();\n  masterGain.gain.value = 0.18;\n  masterGain.connect(actx.destination);\n}\nfunction setSoundOn(on){\n  state.sound = on;\n  document.getElementById('soundBtn').style.opacity = on ? 1 : 0.4;\n  if (on){\n    ensureAudio();\n    if (actx.state === 'suspended') actx.resume();\n    startBGM();\n  } else {\n    stopBGM();\n  }\n}\nfunction sfx(kind, n=1){\n  if (!state.sound) return;\n  ensureAudio();\n  const t0 = actx.currentTime;\n  const g = actx.createGain(); g.connect(masterGain);\n  g.gain.setValueAtTime(0.0, t0);\n  const o = actx.createOscillator(); o.connect(g);\n  o.type = 'triangle';\n  if (kind === 'rot'){\n    o.frequency.setValueAtTime(660, t0);\n    o.frequency.exponentialRampToValueAtTime(880, t0+0.08);\n    g.gain.linearRampToValueAtTime(0.3, t0+0.01);\n    g.gain.exponentialRampToValueAtTime(0.001, t0+0.12);\n    o.start(t0); o.stop(t0+0.14);\n  } else if (kind === 'drop'){\n    o.frequency.setValueAtTime(220, t0);\n    o.frequency.exponentialRampToValueAtTime(110, t0+0.15);\n    g.gain.linearRampToValueAtTime(0.35, t0+0.01);\n    g.gain.exponentialRampToValueAtTime(0.001, t0+0.2);\n    o.start(t0); o.stop(t0+0.22);\n  } else if (kind === 'move'){\n    o.frequency.setValueAtTime(520, t0);\n    g.gain.linearRampToValueAtTime(0.15, t0+0.005);\n    g.gain.exponentialRampToValueAtTime(0.001, t0+0.06);\n    o.start(t0); o.stop(t0+0.08);\n  } else if (kind === 'clear'){\n    // chime: C E G up, extra sparkle for tetris\n    const notes = n>=4 ? [523, 659, 784, 1046, 1318] : [523, 659, 784];\n    notes.forEach((f, i)=>{\n      const gg = actx.createGain(); gg.connect(masterGain);\n      const oo = actx.createOscillator(); oo.connect(gg);\n      oo.type = 'triangle'; oo.frequency.value = f;\n      const start = t0 + i*0.07;\n      gg.gain.setValueAtTime(0, start);\n      gg.gain.linearRampToValueAtTime(0.3, start+0.01);\n      gg.gain.exponentialRampToValueAtTime(0.001, start+0.35);\n      oo.start(start); oo.stop(start+0.4);\n    });\n    return;\n  } else if (kind === 'levelup'){\n    // rising tension cue: three ascending notes with slight detune\n    const notes = [440, 554, 659, 880];\n    notes.forEach((f,i)=>{\n      const gg = actx.createGain(); gg.connect(masterGain);\n      const oo = actx.createOscillator(); oo.connect(gg);\n      oo.type = 'sawtooth'; oo.frequency.value = f;\n      const start = t0 + i*0.09;\n      gg.gain.setValueAtTime(0, start);\n      gg.gain.linearRampToValueAtTime(0.18, start+0.01);\n      gg.gain.exponentialRampToValueAtTime(0.001, start+0.3);\n      oo.start(start); oo.stop(start+0.35);\n    });\n    return;\n  } else if (kind === 'over'){\n    const notes = [523, 415, 349, 262];\n    notes.forEach((f, i)=>{\n      const gg = actx.createGain(); gg.connect(masterGain);\n      const oo = actx.createOscillator(); oo.connect(gg);\n      oo.type = 'triangle'; oo.frequency.value = f;\n      const start = t0 + i*0.13;\n      gg.gain.setValueAtTime(0, start);\n      gg.gain.linearRampToValueAtTime(0.3, start+0.01);\n      gg.gain.exponentialRampToValueAtTime(0.001, start+0.45);\n      oo.start(start); oo.stop(start+0.5);\n    });\n    return;\n  }\n}\n\n/* Looping BGM — gets more intense as level rises.\n   - Low levels: major pentatonic, slow, soft triangle, lowpass open\n   - High levels: natural minor, faster tempo, saw lead, bass 8ths, hat, lowpass closed */\nfunction bgmParamsForLevel(level){\n  // level 1..∞ — clamp intensity 0..1 by level 10\n  const k = Math.min(1, Math.max(0, (level - 1) / 9));\n  // major pentatonic  ->  minor (natural) + added b5 for tension at top\n  const major = [0, 4, 7, 4, 2, 7, 9, 7,  0, 4, 7, 11, 9, 7, 4, 2];\n  const minor = [0, 3, 7, 3, 2, 7, 8, 7,  0, 3, 7, 10, 8, 7, 5, 3];\n  const panic = [0, 3, 6, 3, 1, 6, 8, 6,  0, 3, 7, 10, 8, 6, 5, 1]; // + b5 tritone\n  const pattern =\n    k < 0.4 ? major :\n    k < 0.8 ? minor :\n              panic;\n  const bassRoots =\n    k < 0.4 ? [0, 5, 7, 5]         // I-IV-V-IV\n            : [0, 0, 5, 7];         // drone-ish i, i, iv, V\n  return {\n    pattern,\n    bassRoots,\n    tempo:    Math.round(260 - 130 * k),   // 260ms -> 130ms\n    baseMidi: 60 - Math.round(k * 2),      // drift down a step for weight\n    leadType: k < 0.5 ? 'triangle' : 'sawtooth',\n    bassType: k < 0.6 ? 'sine'     : 'sawtooth',\n    filterHz: 1800 - Math.round(900 * k),  // close the filter as things get tense\n    leadGain: 0.28 + 0.10 * k,\n    bassGain: 0.55 + 0.25 * k,\n    bassEveryStep: k < 0.6 ? 4 : 2,        // bass 8ths at high intensity\n    hat: k >= 0.5,\n  };\n}\n\nfunction startBGM(){\n  if (bgmNodes) return;\n  ensureAudio();\n  const out  = actx.createGain(); out.gain.value = 0.9; out.connect(masterGain);\n  const filt = actx.createBiquadFilter(); filt.type = 'lowpass'; filt.frequency.value = 1800; filt.connect(out);\n  const midiToHz = m => 440 * Math.pow(2, (m-69)/12);\n\n  let i = 0;\n  let params = bgmParamsForLevel(state.level);\n  let currentTempo = params.tempo;\n\n  const scheduleStep = () => {\n    if (!state.sound){ return; }\n    if (state.paused){\n      bgmNodes.to = setTimeout(scheduleStep, 60);\n      return;\n    }\n    // refresh params (tempo/key can have changed since last step)\n    params = bgmParamsForLevel(state.level);\n    // smoothly retune the filter toward the target\n    try {\n      filt.frequency.setTargetAtTime(params.filterHz, actx.currentTime, 0.15);\n    } catch(e){}\n\n    const t0 = actx.currentTime;\n    const m  = params.baseMidi + params.pattern[i % params.pattern.length];\n\n    // lead\n    const g = actx.createGain(); g.connect(filt);\n    const o = actx.createOscillator(); o.type = params.leadType;\n    o.frequency.value = midiToHz(m); o.connect(g);\n    g.gain.setValueAtTime(0, t0);\n    g.gain.linearRampToValueAtTime(params.leadGain, t0+0.01);\n    g.gain.exponentialRampToValueAtTime(0.001, t0+0.35);\n    o.start(t0); o.stop(t0+0.4);\n\n    // bass\n    if (i % params.bassEveryStep === 0){\n      const root = params.bassRoots[(Math.floor(i/params.bassEveryStep)) % params.bassRoots.length];\n      const bf = midiToHz(params.baseMidi - 12 + root);\n      const bg = actx.createGain(); bg.connect(out);\n      const bo = actx.createOscillator(); bo.type = params.bassType;\n      bo.frequency.value = bf; bo.connect(bg);\n      bg.gain.setValueAtTime(0, t0);\n      bg.gain.linearRampToValueAtTime(params.bassGain * 0.12, t0+0.02);\n      bg.gain.exponentialRampToValueAtTime(0.001, t0+0.5);\n      bo.start(t0); bo.stop(t0+0.55);\n    }\n\n    // hat (noise burst) on off-beats at high intensity\n    if (params.hat && i % 2 === 1){\n      const bufSize = 0.05 * actx.sampleRate;\n      const noise = actx.createBuffer(1, bufSize, actx.sampleRate);\n      const ch = noise.getChannelData(0);\n      for (let k=0;k<bufSize;k++) ch[k] = (Math.random()*2-1);\n      const src = actx.createBufferSource(); src.buffer = noise;\n      const hp = actx.createBiquadFilter(); hp.type='highpass'; hp.frequency.value = 6000;\n      const ng = actx.createGain(); ng.gain.setValueAtTime(0.05, t0);\n      ng.gain.exponentialRampToValueAtTime(0.001, t0+0.05);\n      src.connect(hp); hp.connect(ng); ng.connect(out);\n      src.start(t0); src.stop(t0+0.06);\n    }\n\n    i++;\n    currentTempo = params.tempo;\n    bgmNodes.to = setTimeout(scheduleStep, currentTempo);\n  };\n\n  bgmNodes = { out, filt, to: null };\n  bgmNodes.to = setTimeout(scheduleStep, 0);\n}\nfunction stopBGM(){\n  if (!bgmNodes) return;\n  clearTimeout(bgmNodes.to);\n  try { bgmNodes.out.disconnect(); bgmNodes.filt.disconnect(); } catch(e){}\n  bgmNodes = null;\n}\n\n/* ---------- Game control ---------- */\nfunction startGame(){\n  resetBoard();\n  state.score = 0; state.lines = 0; state.level = 1;\n  dropInterval = 700;\n  state.over = false; state.paused = false; state.running = true;\n  bag = []; next = randType();\n  spawn();\n  updateHUD();\n  hideOverlay();\n  if (state.sound) { ensureAudio(); actx.resume && actx.resume(); startBGM(); }\n  lastTs = 0;\n  requestAnimationFrame(tick);\n}\nfunction gameOver(){\n  state.over = true; state.running = false;\n  stopBGM();\n  sfx('over');\n  showOverlay('おしまい', `スコア ${state.score.toLocaleString()}`, 'もう一回');\n}\nfunction togglePause(){\n  if (!state.running || state.over) return;\n  state.paused = !state.paused;\n  if (state.paused){\n    showOverlay('ひとやすみ', 'タップで再開', 'つづける');\n  } else {\n    hideOverlay();\n  }\n}\nfunction showOverlay(title, sub, btn){\n  document.getElementById('ovTitle').textContent = title;\n  document.getElementById('ovSub').textContent = sub;\n  document.getElementById('startBtn').textContent = btn;\n  document.getElementById('overlay').classList.add('on');\n}\nfunction hideOverlay(){ document.getElementById('overlay').classList.remove('on'); }\n\n/* ---------- Input ---------- */\nfunction bindHold(btn, fn, initial=160, repeat=60){\n  let t, r, active=false;\n  const start = (e)=>{\n    e.preventDefault(); if (active) return; active=true;\n    fn();\n    t = setTimeout(()=>{ r = setInterval(fn, repeat); }, initial);\n  };\n  const end = ()=>{ active=false; clearTimeout(t); clearInterval(r); };\n  btn.addEventListener('pointerdown', start);\n  btn.addEventListener('pointerup', end);\n  btn.addEventListener('pointerleave', end);\n  btn.addEventListener('pointercancel', end);\n}\n\nbindHold(document.getElementById('leftBtn'),  ()=>{ if(state.running&&!state.paused&&!state.over){ if(tryMove(-1,0)) sfx('move'); }});\nbindHold(document.getElementById('rightBtn'), ()=>{ if(state.running&&!state.paused&&!state.over){ if(tryMove(1,0))  sfx('move'); }});\n// tap helper: fires on pointerup OR click, whichever comes first, without double-firing\nfunction onTap(el, fn){\n  let fired = false;\n  const handler = (e)=>{\n    if (fired) return;\n    fired = true;\n    // reset on next tick so subsequent taps still work\n    setTimeout(()=>{ fired = false; }, 250);\n    fn(e);\n  };\n  el.addEventListener('pointerup', handler);\n  el.addEventListener('click', handler);\n}\nonTap(document.getElementById('rotBtn'),   ()=>{ if(state.running&&!state.paused&&!state.over) rotate(); });\nonTap(document.getElementById('dropBtn'),  ()=>{ if(state.running&&!state.paused&&!state.over) hardDrop(); });\nonTap(document.getElementById('startBtn'), ()=>{\n  if (state.paused){ state.paused=false; hideOverlay(); return; }\n  startGame();\n});\nonTap(document.getElementById('pauseBtn'), togglePause);\nonTap(document.getElementById('soundBtn'), ()=> setSoundOn(!state.sound));\n\nwindow.addEventListener('keydown', (e)=>{\n  if (e.key === 'ArrowLeft'){ if(state.running&&!state.paused&&!state.over){ if(tryMove(-1,0)) sfx('move'); } e.preventDefault();}\n  else if (e.key === 'ArrowRight'){ if(state.running&&!state.paused&&!state.over){ if(tryMove(1,0)) sfx('move'); } e.preventDefault();}\n  else if (e.key === 'ArrowDown'){ if(state.running&&!state.paused&&!state.over){ tryMove(0,1); } e.preventDefault();}\n  else if (e.key === 'ArrowUp' || e.key === 'x' || e.key === 'X'){ if(state.running&&!state.paused&&!state.over) rotate(); e.preventDefault();}\n  else if (e.key === ' '){ if(state.running&&!state.paused&&!state.over) hardDrop(); e.preventDefault();}\n  else if (e.key.toLowerCase() === 'p'){ togglePause(); }\n});\n\n/* Prevent scroll on mobile when holding the d-pad buttons (but NOT the .btn / icon-btn, whose tap must still fire) */\ndocument.querySelectorAll('.ctrl').forEach(b=>{\n  b.addEventListener('touchstart', e=> e.preventDefault(), {passive:false});\n});\n\n/* ---------- Themes ---------- */\nfunction applyTheme(name){\n  const root = document.documentElement.style;\n  const themes = {\n    sakura: { bg:'#fbe9ee', bg2:'#e7f4f9' },\n    mint:   { bg:'#e4f5ea', bg2:'#effaf3' },\n    sky:    { bg:'#e4eefa', bg2:'#f2f7fc' },\n  };\n  const t = themes[name] || themes.sakura;\n  root.setProperty('--bg', t.bg);\n  root.setProperty('--bg-2', t.bg2);\n}\n\n/* ---------- Tweaks (edit-mode) ---------- */\nconst tweaksEl = document.getElementById('tweaks');\nfunction sendKeys(edits){\n  try { window.parent.postMessage({type:'__edit_mode_set_keys', edits}, '*'); } catch(e){}\n}\nwindow.addEventListener('message', (ev)=>{\n  const d = ev.data || {};\n  if (d.type === '__activate_edit_mode') tweaksEl.classList.add('on');\n  else if (d.type === '__deactivate_edit_mode') tweaksEl.classList.remove('on');\n});\ntry { window.parent.postMessage({type:'__edit_mode_available'}, '*'); } catch(e){}\n\n// speed\nconst tSpeed = document.getElementById('tSpeed');\ntSpeed.value = state.speed;\ntSpeed.addEventListener('input', ()=>{\n  state.speed = parseFloat(tSpeed.value);\n  sendKeys({speed: state.speed});\n});\n// sound / theme / ghost chips\ndocument.querySelectorAll('#tweaks [data-sound]').forEach(el=>{\n  el.addEventListener('click', ()=>{\n    document.querySelectorAll('#tweaks [data-sound]').forEach(x=>x.classList.remove('on'));\n    el.classList.add('on');\n    const on = el.dataset.sound === 'on';\n    setSoundOn(on);\n    sendKeys({sound: on});\n  });\n});\ndocument.querySelectorAll('#tweaks [data-theme]').forEach(el=>{\n  el.addEventListener('click', ()=>{\n    document.querySelectorAll('#tweaks [data-theme]').forEach(x=>x.classList.remove('on'));\n    el.classList.add('on');\n    state.theme = el.dataset.theme;\n    applyTheme(state.theme);\n    sendKeys({theme: state.theme});\n  });\n});\ndocument.querySelectorAll('#tweaks [data-ghost]').forEach(el=>{\n  el.addEventListener('click', ()=>{\n    document.querySelectorAll('#tweaks [data-ghost]').forEach(x=>x.classList.remove('on'));\n    el.classList.add('on');\n    state.ghost = el.dataset.ghost === 'on';\n    sendKeys({ghost: state.ghost});\n  });\n});\n// reflect defaults\nfunction syncTweakUI(){\n  document.querySelectorAll('#tweaks [data-sound]').forEach(x=>x.classList.toggle('on', (x.dataset.sound==='on')===!!state.sound));\n  document.querySelectorAll('#tweaks [data-theme]').forEach(x=>x.classList.toggle('on', x.dataset.theme===state.theme));\n  document.querySelectorAll('#tweaks [data-ghost]').forEach(x=>x.classList.toggle('on', (x.dataset.ghost==='on')===!!state.ghost));\n}\n\n/* ---------- Init ---------- */\napplyTheme(state.theme);\nsyncTweakUI();\nsizeCanvases();\nresetBoard();\ndraw();\nupdateHUD();\n// start overlay visible\ndocument.getElementById('overlay').classList.add('on');\n// sound starts off until user taps start (autoplay policy)\ndocument.getElementById('soundBtn').style.opacity = state.sound ? 1 : 0.4;\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
