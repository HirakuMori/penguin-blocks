<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LOOP FORGE</title>
    <style>
      :root{--bg:#f6f3eb;--panel:#fffdf7;--line:#e1d8c8;--ink:#2d3b2f;--green:#6e925e;font-family:"Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif}
      *{box-sizing:border-box}body{margin:0;background:radial-gradient(circle at top,#ffffff,#f3efe6 70%);color:var(--ink)}
      .app{max-width:540px;margin:0 auto;padding:12px}.hud{display:grid;grid-template-columns:repeat(3,1fr) 52px;gap:8px;align-items:center}
      .card{background:var(--panel);border:2px solid var(--line);border-radius:14px;padding:8px;text-align:center}.k{font-size:11px;font-weight:700;color:#617264}.v{font-size:38px;font-weight:900;line-height:1.05}
      .btn{height:52px;border-radius:14px;border:2px solid var(--line);background:var(--panel);font-size:26px}
      .boardWrap{margin-top:10px;background:var(--panel);border:3px solid #dfd3bc;border-radius:16px;padding:10px;touch-action:none;user-select:none}
      .board{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;position:relative}
      .cell{aspect-ratio:1/1;background:#fff9ed;border:2px solid #eadfca;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:40px;transition:transform .16s ease,box-shadow .16s ease,opacity .22s ease}
      .cell.dragging{transform:scale(1.08);box-shadow:0 6px 16px rgba(90,120,71,.28);z-index:2}.cell.pop{animation:pop .26s ease}.cell.vanish{animation:vanish .28s ease forwards}
      @keyframes pop{50%{transform:scale(1.22)}}@keyframes vanish{to{opacity:0;transform:scale(.3) rotate(-8deg)}}
      .shelf{margin-top:10px;background:var(--panel);border:2px solid var(--line);border-radius:14px;padding:10px}.meter{height:12px;background:#ece5d7;border-radius:999px;overflow:hidden}.bar{height:100%;background:linear-gradient(90deg,#7caf5f,#95ce67);width:0;transition:width .2s}
      .meta{display:flex;justify-content:space-between;align-items:center;font-weight:700;margin-bottom:8px}.note{margin-top:8px;font-size:13px;color:#617264;min-height:1.4em}
      .tools{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}.tools button{padding:10px;border-radius:12px;border:2px solid var(--line);background:var(--panel);font-weight:700}
      .back{display:block;margin-top:10px}.over{position:absolute;inset:0;background:rgba(40,55,36,.7);border-radius:10px;display:none;align-items:center;justify-content:center;color:#fff;font-weight:900;font-size:42px}.over.show{display:flex}
    </style>
  </head>
  <body>
    <div class="app">
      <div class="hud">
        <div class="card"><div class="k">SCORE</div><div class="v" id="score">0</div></div>
        <div class="card"><div class="k">MOVES</div><div class="v" id="moves">18</div></div>
        <div class="card"><div class="k">BEST</div><div class="v" id="best">0</div></div>
        <button class="btn" id="retry">↻</button>
      </div>
      <div class="boardWrap" id="boardWrap"><div class="board" id="board"></div><div class="over" id="over">GAME OVER</div></div>
      <div class="shelf"><div class="meta"><span>目標：128の花咲かせる</span><span id="progTxt">0 / 128</span></div><div class="meter"><div class="bar" id="bar"></div></div><div class="note" id="note">同じレベルをドラッグして重ねると進化します。</div></div>
      <div class="tools"><button id="pause">⏸ 一時停止</button><button id="sound">♪ サウンド</button></div>
      <a class="back" href="../../index.html">ゲーム一覧へ戻る</a>
    </div>
    <script>
      const SIZE=5,START_MOVES=18,TARGET=128,EMOJI=['','🟤','🌱','🌿','🌸','🌼'];
      const scoreEl=score,movesEl=moves,bestEl=best,boardEl=board,noteEl=note,overEl=over,barEl=bar,progTxtEl=progTxt;
      const st={grid:[],score:0,moves:START_MOVES,best:+(localStorage.getItem('loopForgeBestScore')||0),paused:false,over:false,sound:localStorage.getItem('loopForgeSound')!=='0',drag:null};
      const randSpawn=()=>Math.random()<.66?1:2;
      const scoreTable={2:10,3:30,4:100,5:300,clear5:1000};
      function init(){st.grid=Array.from({length:SIZE},()=>Array.from({length:SIZE},()=>Math.random()<.32?randSpawn():0));if(st.grid.flat().every(v=>v===0))st.grid[2][2]=1;st.score=0;st.moves=START_MOVES;st.over=false;st.paused=false;updateHud();render();note('同じレベルをドラッグして重ねると進化します。');}
      function note(t){noteEl.textContent=t}
      function updateHud(){scoreEl.textContent=st.score.toLocaleString();movesEl.textContent=st.moves;bestEl.textContent=st.best.toLocaleString();const p=Math.min(1,maxTile()/TARGET);barEl.style.width=`${p*100}%`;progTxtEl.textContent=`${maxTile()} / ${TARGET}`;sound.textContent=st.sound?'♪ サウンド':'× サウンド';pause.textContent=st.paused?'▶ 再開':'⏸ 一時停止';}
      function render(){boardEl.innerHTML='';for(let r=0;r<SIZE;r++)for(let c=0;c<SIZE;c++){const v=st.grid[r][c],d=document.createElement('div');d.className='cell';d.dataset.r=r;d.dataset.c=c;d.textContent=v?EMOJI[Math.min(5,v)]||'🌼':'';if(st.drag&&st.drag.r===r&&st.drag.c===c)d.classList.add('dragging');boardEl.appendChild(d);}if(st.over)overEl.classList.add('show');else overEl.classList.remove('show');}
      const id=(r,c)=>r*SIZE+c,cellById=n=>boardEl.children[n];
      function cellFromEvent(e){const el=document.elementFromPoint(e.clientX,e.clientY)?.closest('.cell');if(!el||!boardEl.contains(el))return null;return{r:+el.dataset.r,c:+el.dataset.c};}
      function spawnOne(){const empty=[];for(let r=0;r<SIZE;r++)for(let c=0;c<SIZE;c++)if(!st.grid[r][c])empty.push([r,c]);if(!empty.length)return false;const [r,c]=empty[Math.random()*empty.length|0];st.grid[r][c]=randSpawn();return true;}
      function gravity(){for(let c=0;c<SIZE;c++){let w=SIZE-1;for(let r=SIZE-1;r>=0;r--)if(st.grid[r][c]){const v=st.grid[r][c];st.grid[r][c]=0;st.grid[w][c]=v;w--;}}}
      function autoMerge(){let merged=false,combo=0;while(true){gravity();let did=false;for(let r=SIZE-1;r>=0;r--)for(let c=0;c<SIZE;c++){const v=st.grid[r][c];if(!v)continue;const nr=r+1<SIZE?st.grid[r+1][c]:0;if(nr===v){st.grid[r+1][c]=v+1;st.grid[r][c]=0;did=true;merged=true;combo++;st.score+=(v+1===5?scoreTable[5]:scoreTable[v+1]||0);if(v+1>5){st.score+=scoreTable.clear5;st.grid[r+1][c]=0;note('Lv.5同士が重なり花びらが舞った！');}}}if(!did)break;}if(combo>=2)note(`連鎖 ${combo} コンボ！`);return merged;}
      function maxTile(){return Math.max(0,...st.grid.flat())}
      function anyMove(){for(let r=0;r<SIZE;r++)for(let c=0;c<SIZE;c++){const v=st.grid[r][c];if(!v)return true;if(r+1<SIZE&&st.grid[r+1][c]===v)return true;if(c+1<SIZE&&st.grid[r][c+1]===v)return true;}return false;}
      function finishCheck(){if(maxTile()>=TARGET){st.over=true;over.textContent='CLEAR!';note('128の花を咲かせました！');}else if(st.moves<=0||!anyMove()){st.over=true;over.textContent='GAME OVER';note('これ以上移動・マージできません。');}if(st.over&&st.score>st.best){st.best=st.score;localStorage.setItem('loopForgeBestScore',String(st.best));}}
      function playMove(a,b){const va=st.grid[a.r][a.c],vb=st.grid[b.r][b.c];if(!va||va!==vb){note('同じレベルの植物に重ねてください。');return;}st.grid[a.r][a.c]=0;st.grid[b.r][b.c]=vb+1;const up=vb+1;st.score+=(up===5?scoreTable[5]:scoreTable[up]||0);if(up>5){st.score+=scoreTable.clear5;st.grid[b.r][b.c]=0;note('大きな花が消滅してボーナス！');}st.moves--;autoMerge();gravity();spawnOne();autoMerge();finishCheck();updateHud();render();if(!st.over)note('うまく育っています。連鎖を狙おう。');}
      boardWrap.addEventListener('pointerdown',e=>{if(st.paused||st.over)return;const c=cellFromEvent(e);if(!c||!st.grid[c.r][c.c])return;st.drag=c;render();boardWrap.setPointerCapture(e.pointerId);});
      boardWrap.addEventListener('pointerup',e=>{if(!st.drag)return;const from=st.drag,to=cellFromEvent(e);st.drag=null;if(!to||from.r===to.r&&from.c===to.c){render();return;}playMove(from,to);});
      retry.addEventListener('click',init);pause.addEventListener('click',()=>{st.paused=!st.paused;updateHud();note(st.paused?'一時停止中です。':'再開しました。');});
      sound.addEventListener('click',()=>{st.sound=!st.sound;localStorage.setItem('loopForgeSound',st.sound?'1':'0');updateHud();});
      init();
    </script>
  </body>
</html>
