<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LOOP FORGE</title>
    <style>
      :root{--ivory:#f7f6f2;--sky:#aee2f7;--teal:#4cc0b6;--lemon:#ffe082;--coral:#ff8e7a;--slate:#64748b;font-family:"Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif}
      body{margin:0;background:linear-gradient(#f8fdff,#edf8fb);color:#1f3b53}
      .app{max-width:540px;margin:0 auto;padding:14px}
      .hud{display:grid;grid-template-columns:1fr 1fr 56px;gap:8px;align-items:center;margin-bottom:10px}
      .panel{background:#fff;border:1px solid #cfe2ec;border-radius:14px;padding:8px 10px;text-align:center}
      .label{font-size:12px;color:#507086}.value{font-size:34px;font-weight:800;line-height:1}
      .sub{font-size:12px}.btn{height:56px;border:none;border-radius:14px;background:#fff;border:1px solid #cfe2ec;font-size:24px}
      .goal{background:#fff;border:1px solid #d7e6ef;border-radius:999px;padding:8px 10px;text-align:center;margin-bottom:10px;font-weight:700}
      .board{position:relative;background:#fff;border:2px solid #d5e7f0;border-radius:18px;padding:10px;touch-action:none;user-select:none}
      .grid{display:grid;grid-template-columns:repeat(5,1fr);gap:6px}
      .cell{aspect-ratio:1/1;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:38px;font-weight:800;border:2px solid rgba(255,255,255,.85);box-shadow: inset 0 -8px 15px rgba(0,0,0,.06)}
      .n1{background:#b9d9f7;color:#1e4b72}.n2{background:#d2ecbb;color:#2d5e29}.n3{background:#ffe8aa;color:#785100}.n4{background:#ffd0c7;color:#7c3126}.n5{background:#b8e9f0;color:#0a5a67}.n6{background:#becdf1;color:#263f84}.n7{background:#d9bff3;color:#5a2a7d}.n8{background:#9ed9ff;color:#17436d}
      .path{position:absolute;inset:10px;pointer-events:none}
      .path svg{width:100%;height:100%}
      .pathline{fill:none;stroke:#74dbff;stroke-width:16;stroke-linecap:round;stroke-linejoin:round;filter:drop-shadow(0 0 6px rgba(81,212,255,.8))}
      .dot{fill:#fff;stroke:#5ac8f5;stroke-width:5}
      .fx{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);font-size:44px;font-weight:900;color:#53a8d8;opacity:0;pointer-events:none}
      .fx.show{animation:pop .55s ease}
      @keyframes pop{0%{opacity:0;transform:translate(-50%,-30%) scale(.4)}35%{opacity:1;transform:translate(-50%,-50%) scale(1.2)}100%{opacity:0;transform:translate(-50%,-70%) scale(1)}}
      .tools{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-top:8px}
      .tools button{padding:10px;border-radius:12px;border:1px solid #cfe2ec;background:#fff;font-weight:700}
      .note{margin-top:8px;font-size:13px;color:#4d6a7e}.back{display:block;margin-top:10px}
    </style>
  </head>
  <body>
    <div class="app">
      <h1>LOOP FORGE</h1>
      <div class="hud">
        <div class="panel"><div class="label">手数</div><div class="value" id="moves">20</div></div>
        <div class="panel"><div class="label">スコア</div><div class="value" id="score">0</div></div>
        <button class="btn" id="pauseBtn">⏸</button>
      </div>
      <div class="goal" id="goal">目標: 128タイルを作る</div>
      <div class="board" id="board"><div class="grid" id="grid"></div><div class="path" id="path"></div><div class="fx" id="fx"></div></div>
      <div class="tools"><button id="retryBtn">↻ リトライ</button><button id="hintBtn">? ヒント</button></div>
      <div class="note" id="note">同じ数字を2個以上なぞって離すと、最後のマスで+1に合体します。</div>
      <a class="back" href="../../index.html">ゲーム一覧へ戻る</a>
    </div>
    <script>
      const SIZE=5,START_MOVES=20;const gridEl=document.getElementById('grid'),boardEl=document.getElementById('board'),pathEl=document.getElementById('path'),movesEl=document.getElementById('moves'),scoreEl=document.getElementById('score'),noteEl=document.getElementById('note'),goalEl=document.getElementById('goal'),fxEl=document.getElementById('fx');
      const st={grid:[],moves:START_MOVES,score:0,paused:false,done:false,path:[],target:128,best:Number(localStorage.getItem('loopForgeBest')||0)};
      function randBase(){return 1+Math.floor(Math.random()*4)}
      function init(){st.grid=Array.from({length:SIZE},()=>Array.from({length:SIZE},randBase));st.moves=START_MOVES;st.score=0;st.done=false;st.paused=false;st.path=[];updateHud();render();note('ループを描いて大連鎖を狙おう。')}
      function note(t){noteEl.textContent=t}
      function updateHud(){movesEl.textContent=st.moves;scoreEl.textContent=st.score;goalEl.textContent=`目標: ${st.target}タイルを作る / BEST ${st.best}`}
      function cls(n){return `n${Math.min(8,n)}`}
      function render(){gridEl.innerHTML='';for(let r=0;r<SIZE;r++)for(let c=0;c<SIZE;c++){const d=document.createElement('div');d.className=`cell ${cls(st.grid[r][c])}`;d.dataset.r=r;d.dataset.c=c;d.textContent=st.grid[r][c];gridEl.appendChild(d);}drawPath()}
      function cellFromEvent(e){const t=e.target.closest('.cell');if(!t)return null;return {r:+t.dataset.r,c:+t.dataset.c,val:st.grid[+t.dataset.r][+t.dataset.c]}}
      function adj(a,b){return Math.abs(a.r-b.r)+Math.abs(a.c-b.c)===1}
      function drawPath(){if(st.path.length===0){pathEl.innerHTML='';return;}const rect=gridEl.getBoundingClientRect();const cells=[...gridEl.children];const center=(p)=>{const el=cells[p.r*SIZE+p.c],r=el.getBoundingClientRect();return [r.left-rect.left+r.width/2,r.top-rect.top+r.height/2]};const pts=st.path.map(center);const poly=pts.map(p=>p.join(',')).join(' ');pathEl.innerHTML=`<svg viewBox="0 0 ${rect.width} ${rect.height}" preserveAspectRatio="none"><polyline class="pathline" points="${poly}"/>${pts.map(([x,y])=>`<circle class="dot" cx="${x}" cy="${y}" r="11"/>`).join('')}</svg>`}
      function pushPath(cell){const p=st.path; if(p.length===0){p.push(cell);return true;}const last=p[p.length-1];if(cell.r===last.r&&cell.c===last.c)return false;const idx=p.findIndex(v=>v.r===cell.r&&v.c===cell.c);if(idx>=0&&idx===p.length-2){p.pop();return true;}if(!adj(last,cell))return false;if(cell.val!==p[0].val)return false;p.push(cell);return true;}
      function resolvePath(){if(st.path.length<2){st.path=[];drawPath();return;}const base=st.path[0].val;const last=st.path[st.path.length-1];for(let i=0;i<st.path.length-1;i++){const p=st.path[i];st.grid[p.r][p.c]=0;}st.grid[last.r][last.c]=base+1;const gained=st.path.length*(base*10)+Math.max(0,st.path.length-3)*15;st.score+=gained;st.moves--;collapse();refill();showFx(`+${base+1}`);if(base+1>st.best){st.best=base+1;localStorage.setItem('loopForgeBest',String(st.best));}st.path=[];drawPath();updateHud();render();checkEnd();}
      function collapse(){for(let c=0;c<SIZE;c++){let write=SIZE-1;for(let r=SIZE-1;r>=0;r--){if(st.grid[r][c]>0){const v=st.grid[r][c];st.grid[r][c]=0;st.grid[write][c]=v;write--;}}}}
      function refill(){for(let r=0;r<SIZE;r++)for(let c=0;c<SIZE;c++)if(st.grid[r][c]===0)st.grid[r][c]=randBase()}
      function showFx(t){fxEl.textContent=t;fxEl.classList.remove('show');void fxEl.offsetWidth;fxEl.classList.add('show')}
      function maxTile(){return Math.max(...st.grid.flat())}
      function hasMove(){for(let r=0;r<SIZE;r++)for(let c=0;c<SIZE;c++){if(r+1<SIZE&&st.grid[r][c]===st.grid[r+1][c])return true;if(c+1<SIZE&&st.grid[r][c]===st.grid[r][c+1])return true;}return false}
      function checkEnd(){if(maxTile()>=st.target){st.done=true;note('クリア！リトライで再挑戦できます。');return;}if(st.moves<=0||!hasMove()){st.done=true;note('ゲーム終了！リトライで再挑戦。');}}
      let drawing=false;
      boardEl.addEventListener('pointerdown',e=>{if(st.paused||st.done)return;const c=cellFromEvent(e);if(!c)return;drawing=true;st.path=[c];drawPath();boardEl.setPointerCapture(e.pointerId)});
      boardEl.addEventListener('pointermove',e=>{if(!drawing||st.paused||st.done)return;const c=cellFromEvent(e);if(!c)return;if(pushPath(c)){drawPath();}});
      boardEl.addEventListener('pointerup',()=>{if(!drawing)return;drawing=false;resolvePath();});
      boardEl.addEventListener('pointercancel',()=>{drawing=false;st.path=[];drawPath();});
      document.getElementById('retryBtn').addEventListener('click',init);
      document.getElementById('pauseBtn').addEventListener('click',e=>{st.paused=!st.paused;e.currentTarget.textContent=st.paused?'▶':'⏸';note(st.paused?'一時停止中':'再開')});
      document.getElementById('hintBtn').addEventListener('click',()=>note('同じ数字が密集している場所を短く往復して、次ターンの種を作ると連鎖しやすいです。'));
      init();
    </script>
  </body>
</html>
